 UIA_HRYTSAK_DESC:0 "Hrytsak is the in quo leader of the Tryzurb military organisation, who recently took over the organisation claiming that the leaders are incompetent. He is only known for his paramilitary passion and strength, however most information is unknown or classified due to paranoia or his cunning nature.\nAccording to most people he is a true Ukrainian patriot, who only speaks in Ukrainian and curses those who speak Russian even though he is from south-eastern Ukraine. He can shoot, fight and command with exceptional skill.\nNickname Hrytsak grew to fame due to his skills of promoting partisan warfare against the Moscow shackles using the platform called Telegram posting videos and photos of so called actions and instructions to perform them."
