 TRA_GATHERING_STORM_DESC: "The PMR (Pridnestrovian Moldavian Republic) declared independence from Moldova on September 2, 1990, after the deputies of the Supreme Soviet of the Moldavian SSR declared the sovereignty of the Moldavian SSR in June 1990. Following an armed conflict in 1992, the PMR fully separated from Moldova. Moldova did not recognize the PMR's secession and considers this territory occupied by the Russian Federation."
