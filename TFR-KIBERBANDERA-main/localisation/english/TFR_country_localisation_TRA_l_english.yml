 uia.1.t:0 "But What Else Is There?"
 uia.1.d:0 "In a secluded park in the Holosiivskyi District in Kyiv, during a dark blue-ish evening, 3 men sat on a bench discussing the recent events.\n\n\"Mykola why do you keep perusing a free Ukraine?\" \"Why do you not, we are Ukrainians and what language are we talking in right now? We are talking in the same language those Katsaps want to destroy!\" \"But Mykola how many times have we fought for a free Ukraine, we have never won and we never will win, how many Ukrainians need to die before you understand that we can live peacefully with the Russi...\"  (Mykola Interrupts abruptly) \"You think we can trust the moskal horde! do you not remember your service back in '14 and '15 where you fought in Illoviask and that damned Airport for 242 days!\"\n\n\"Who was it that betrayed you? Do you not remember the katsaps and those sucker separatists who made us believe we were in a agreement? How many Ukrainians died fighting for freedom and only died due to our pure incompetence of us believing the moskals for a single second, we tried to peruse peace but they only did it to destroy us even more!\" (Finally Bohdan speaks up.) \"Oh Mykola was it not our goal also to destroy those katsaps too? Remember Denys? Only god knows where he is now, he is either dead or will be soon enough! He also fought for a free Ukraine but look where he is now!\" Do you not remember the sacred line \"The Majestic death of the heroes of the Ukrainian nation and the thousands not known to us\" Bohdan? (Mykola gets angrier and angrier with Bohdan and Andriy for not believing the same idea they fought for.)"
