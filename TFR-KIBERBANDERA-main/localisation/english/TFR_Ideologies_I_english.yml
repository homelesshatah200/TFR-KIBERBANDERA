 #Despotism Subideologies
 military_junta: "Military Junta"
 military_junta_desc: "\n\n\n\n£GFX_Ideology_military_junta\n\n\n\n\n\nA §YMilitary Junta§! is a government led by a committee of military leaders. The term is now used to refer to an authoritarian form of government characterized by oligarchic military dictatorship, as distinguished from other categories of authoritarian rule"
 neo_luddism: "Neo-Luddism"
 neo_luddism_desc: "\n\n\n\n£GFX_Ideology_neo_luddism\n\n\n\n\n\n§YNeo-Luddism§! is a movement of groups who resist modern technologies and dictate a return of some or all technologies to a pre-industrial level. Neo-Luddites are characterized by one or more of the following practices passively abandoning the use of technology, harming those who produce technology harmful to the environment, advocating simple living, or sabotaging technology. The modern neo-Luddite movement has connections with the anti-globalization movement, anti-science movement, anarcho-primitivism, radical environmentalism, and deep ecology."
 purification_administration: "Bidenism"
 purification_administration_desc: "\n\n\n\n£GFX_Ideology_caligula\n\n\n\n\n\nDemocracy is the cornerstone of our nation, a cherished principle that has enabled us to grow from thirteen small colonies into a global leader. Today, Joseph Biden stands as the emblem of the American spirit. Despite his advanced age, his mind remains "sharp", and he is willing to fight "tirelessly" for the cause of democracy.\n\nHowever, the cause that generations have protected has been tainted and gravely wounded. Even though the most vicious enemy is gone and his followers have scattered, the purity of democracy is constantly under threat. President Biden calls for action, vowing to do everything possible to eliminate any sinister and reactionary elements and to thoroughly "purify" America’s democratic mission. He aims to make peace the eternal state of this land, regardless of how many free citizens must sacrifice and become martyrs."
 salafi: "Salafism"
 salafi_desc: "\n\n\n\n£GFX_ideology_salafism_banner\n\n\n\n\n\n§YSalafism§! is a political branch of Sunni Islam which derives from advocating a return to the traditions of the "ancestors" (salaf), the first three generations of Muslims said to know the unadulterated, pure form of Islam. The Salafist doctrine is based on looking back to the early years of the religion to understand how the contemporary Muslims should practise their faith. They reject religious innovation or bid'ah and support the implementation of sharia."
 wahabi: "Wahhabism"
 wahabi_desc: "\n\n\n\n£GFX_ideology_wahabi_banner\n\n\n\n\n\n§YWahhabism§! is a Sunni Islamic revivalist and fundamentalist movement associated with the reformist doctrines of the 18th-century Arabian Islamic scholar, theologian, preacher, and activist Muhammad ibn Abd al-Wahhab. Wahhabism has been variously described as "orthodox", "puritan(ical)", "revolutionary"; and as an Islamic "reform movement" to restore "pure monotheistic worship" by devotees."
 absolute_monarchist: "Absolute Monarchy"
 absolute_monarchist_desc: "\n\n\n\n£GFX_ideology_monarchy\n\n\n\n\n\n§YMonarchists§! believe in minimalizing the government and restricting it to local administration. Federal and, in the best case, imperial rule lays in the hand of a respected and wise monarch. The country is to run itself, watched and protected by its ruler, be it a duke, king or emperor, who has absolute power he or she can use if necessary."
 autocrat: "Autocracy"
 autocrat_desc: "\n\n\n\n£GFX_Ideology_autocracy\n\n\n\n\n\n§YAutocracy§! is not an ideology as commonly understood. Autocrats only care about power and how to acquire and maintain it. Reactionary schools of thought are used to suppress liberal, communist and nationalistic movements. Every path to power is justified."
 theocracy: "Theocracy"
 theocracy_desc: "\n\n\n\n£GFX_Ideology_theocracy\n\n\n\n\n\n§YTheocracy§! A rare form of government which recognizes one or more dieties as supreme ruling authorities, with "intermediaries" managing everyday affairs of the government. Most theocratic governments are conservative in their worldview, seeing the current world as decadent and in need of purification from its sin."
 theocracy_LDS: "Mormon Fundamentalism"
 mafia_state: "Mafia State"
 mafia_state_desc: "\n\n\n\n£GFX_Ideology_mafia\n\n\n\n\n\n§YMafia State§! is a state where most of the government apparatus is involved in organized crime. Such states are heavily corrupt and inefficient, only serving to enrich the ruling class and their followers."
 radical_nationalism: "Radical Nationalism"
 radical_nationalism_desc: "\n\n\n\n£GFX_ideology_radical_nationalism_subid\n\n\n\n\n\n§YRadical Nationalism§! is an ideological movement that places utmost importance on the nation as the central unit of social and political organization. It advocates for the preservation and advancement of a particular nation's identity, culture, and interests above all else. Rooted in a strong sense of national pride and patriotism, Radical Nationalism seeks to promote the welfare and sovereignty of the nation, often through radical, autocratic means."
 putinism_despot: "Putinism"
 putinism_despot_desc: "\n\n\n\n£GFX_Ideology_putinism_banner\n\n\n\n\n\n§YPutinism§! is an ideology that is a culmination of Vladimir Putin's ideals. An apolitical authoritarian democracy,  heavily technocratic and state capitalist with an emphasis on free market.\n\nThe state fights for the safety of Russia, using any methods necessary. Russian Nazis mysteriously disappearing without trace, opposition leaders jailed, both anti-immigration and pro-muslim protests being put down - the state seeks to keep a tight balance in the nation. While this causes a lot hate for the state since noone feels like the government "defends" them, it also makes the people apathetic towards politics and ultimately prevents large scale ideological clashes. This, however, does not mean the people hate the nation. Patriotism, traditional values, national unity are all nurtured by the state. The idea of "The Russian World" and a Multi-Polar order are one of the main driving forces of the system itself.\n\nEven if Vladimir Vladimirovich gone, his ideals will live on. However, his system will be improved upon to create a perfect Russia, unchanging and truly united."
 davos_system: "Davos System"
 davos_system_desc: "\n\n\n\n£GFX_GER_davos_system_banner\n\n\n\n\n\nUltraglobalism is a set of ideas and principles established and followed by a very limited circle of the richest and most powerful individuals of the world, represented by people such as Klaus Schwab and the World Economic Forum.\n\nIn the conditions of an ever changing system of the world and the collapse of existing hegemonies, the ultraglobalist elites have come to the conclusion that this process will be fatal for their riches and power, and the only way to preserve them is to take control of the collapse itself and lead it to transform capitalism into an entirely different system.\n\nUltraglobalism strives to establish control over every aspect of human life by means of absolute digitalization and surveillance, mass integration of cybernetics, as well as constructing the total dominance of transnational corporations over the world economy.\n\nFinally, these plans have been realized in Europe under the guise of the §YDavos System§!.\n\n§gSouls will obey, minds will kneel and their bodies will succumb.§!\n\n§RCapital, Purity and Order are driven to its logical end conclusion, to maintain control.\nHumanity must change.§!"
 empty: ""
 empty_desc: "\n\n\n\n£GFX_GER_davos_system_banner\n\n\n\n\n\nKill people good"
 deobandism: "Deobandi Jihadism"
 pax_americana_ultraglobalism: "Pax Americana"
 pax_americana_ultraglobalism_desc: "\n\n\n\n£GFX_USB_ultraglobalism_banner\n\n\n\n\n\nMan has proven itself to be an unstable beast, tearing apart the carefully crafted institutions and pillars designed to keep it under control.\n\nWith the outbreak of the Second American Civil War, mankind has revealed a certain spark: a flame of change that will always burn, ensuring the world undergoes a drastic transformation at the hands of the many, torching away structures that have outlived their purpose and sunk into decay.\n\n§YPax Americana§! argues that the flaw lies in man itself, rather than in the systems built to contain it. Born from the cooperative fusion of the neo-liberal and neo-conservative rules-based world Order, it seeks to reinsert itself into the zeitgeist permanently.\n\nTo the outside world, it appears to be a nation regaining its sanity under the banner of democracy. But behind the veil, men in suits shake hands and pre-determine the fate of millions, ensuring humanity does not fall into the abyss of chaos. They manipulate the human spirit, working in close cooperation with corporations, federal agencies, and long-forgotten families to preserve the same Order that once defeated not one, but three behemoths of history.\n\nRationality to push away anti-social thought, sacrifice to ensure the populace remembers who keeps them safe, and structure to ensure every pawn has a place on the board.\n\nThe chaos of the modern world is yet another behemoth, an inner flame bent on burning away all that has been done to maintain peace.\n\nOrder has returned, and it will snuff out the flame of humanity."
 putinism_imperial: "Neo-Imperial Putinism"
 putinism_imperial_desc: ""

 #Fascism
 fascist: "Fascist"
 fascist_noun: "Fascism"
 fascist_desc: "Fascist Regime"
 fascist_drift: "Drift towards Fascism"
 fascist_color: "§8"
 fascist_color_name: "§8$fascist$§!"
 
 #Fascism Subideologies Mussolini chungus
 classical_fascism: "Classical Fascism"
 classical_fascism_desc: "\n\n\n\n£GFX_Ideology_Fascist\n\n\n\n\n\n§YClassical Fascism§! is the original fascist ideology as developed in Italy by Giovanni Gentile and Benito Mussolini. Classical Fascism is rooted in nationalism, corpratism and the desire of territorial expansion and imperialism. Classical Fascists promote a corporatist economic system whereby employer and employee syndicates are linked together in associations to collectively represent the nation's economic producers and work alongside the state to set national economic policy. This economic system intended to resolve class conflict through collaboration between the classes, in contrast to Socialism, Strasserism or National Bolshevism, which encourages conflict between the classes. Classical Fascism also denounces liberalism, especially classical liberalism, which Fascist leaders denounced as 'the debacle of individualism'."
 clerical_fascism: "Clerical Fascism"
 clerical_fascism_desc: "\n\n\n\n£GFX_ideology_clerical_fascism_banner\n\n\n\n\n\n§YClerical Fascism§! is an ideological movement that combines the principles of fascism with the influence of religious clerics and institutions. It seeks to establish a totalitarian state led by a charismatic leader who embodies both political and religious authority. This ideology emphasizes the fusion of religion and politics, with the aim of creating a society that adheres strictly to traditional religious values.\nAt its core, Clerical Fascism promotes a hierarchical social structure where the state and religious institutions work hand in hand to maintain order and control over all aspects of society."
 vladimir_zhirinovsky_thought: "Vladimir Zhirinovsky Thought"
 vladimir_zhirinovsky_thought_desc: "\n\n\n\n£GFX_Ideology_zhir_thought\n\n\n\n\n\n§YVladimir Zhirinovsky Thought§! or §YImperial thought§! as it is sometimes dubbed, stands for the revival of the Russian people based on their traditional values, the healthy cleaning of society, glorification of the military, and the destruction of liberal and communist ideas.\n\nThe Russian Empire and its greatness, of course, served as the basis of ideology, but Zhirinovsky creates a cult of a charismatic Leader around him, who bears the truth, he and his supporters are using part of the Soviet social policies and the fight against corruption in order to gain more popularity in various sectors of society. Zhirinovites advocate for sovereign pragmatism in the economy - a strong state wing and responsible private business, complete import substitution, and the destruction of advertising brands.\n\nHis followers vary from conservatives and monarchists to Russian nationalists and fascists, they are united by only one thing - loyalty to the ideas of Vladimir Volfovich Zhirinovsky."
 vladimir_zhirinovsky_thought_post_war: "Vladimir Zhirinovsky Thought"
 vladimir_zhirinovsky_thought_post_war_desc: "\n\n\n\n£GFX_Ideology_zhir_thought_post_war\n\n\n\n\n\n§YVladimir Zhirinovksy§! was a visionary. A populist, one that envisioned a powerful Russia, combining nationalism with social programs, a reverance of the military and Orthodoxy alongside a multi-cultural state.  He had created a new behemoth. One that brought down Europe to its knees and established Russian Hegemony as far as Poland once more.  He, unfortunately, has passed away. Yet his vision lives on. His loyal acolytes, those who stood by his side had cemented his policy as law. His legacy is protected, and his ideas have become a new ideology for Russians to follow.\n\nThe §YOrthodox Zhirinovskism§!, due to its civil nature, focuses on Vladimir Volfovich's focus on state capitalism with a social safety nets as their economic focus. The government is largely bureaucratic, yet with a nationalist flare. Culturally it still adheres to the Russian Imperial thought, yet it is also keen on exporting Russian cultural pillars abroad, "returning to the Russian Golden Age" where Russia was a sought after destination of Westerners and conservatives."
 vladimir_zhirinovsky_thought_militarist: "Vladimir Zhirinovsky Thought"
 vladimir_zhirinovsky_thought_militarist_desc: "\n\n\n\n£GFX_Ideology_zhir_thought_militarist\n\n\n\n\n\n§YVladimir Zhirinovksy§! was a visionary. A populist, one that envisioned a powerful Russia, combining nationalism with social programs, a reverance of the military and Orthodoxy alongside a multi-cultural state.  He had created a new behemoth. One that brought down Europe to its knees and established Russian Hegemony as far as Poland once more.  He, unfortunately, has passed away. Yet his vision lives on. His loyal acolytes, those who stood by his side had cemented his policy as law. His legacy is protected, and his ideas have become a new ideology for Russians to follow.\n\nThe §YMilitarist Zhirinovskism§!, unlike its Orthodox counterpart, is effectively a military Junta. One that adheres to Vladimir Volfovich's principles of Orthodoxy and Imperial thought. They advocate for a martial culture inside Russia to revive its roots, and promote multi-ethnic military integration schemes to "further unite the people of Russia" . This does not mean that civil society is dead, it is however largely reliant on the military government for support."
 ecofascism: "Ecofascism"
 ecofascism_desc: "\n\n\n\n£GFX_Ideology_Ecofascist\n\n\n\n\n\n§YEcofascism§! is a syncretic ideology combining far-right politics with enviromentalism. In modern times, Ecofascists are most concerned with the over-industrialization of society, and what they see as postmodernism destroying the traditional way of life, as well as the planet. Concerned about overpopulation, many ecofascists use "lifeboat ethics" in order to justify wiping out entire populations in order to preserve the natural world. They believe that the only way to save the human race is through eugenics and the destruction of modern industrial society."
 national_syndicalism: "National-Syndicalism"
 national_syndicalism_desc: "\n\n\n\n£GFX_Ideology_national_syndicalism_banner\n\n\n\n\n\n§YNational Syndicalism§! is a far-right adaptation of syndicalism to suit the agenda of revolutionary nationalism. Despite differing on curtain minor topics, national syndicalists hold a common set of principles: the rejection of bourgeois values, democracy, liberalism, Marxism, internationalism, and pacifism, while promoting heroism, vitalism, and violence. They strive to create a 'pure' proletarian nation that'll be able to push back against globalistic world order and "internationalist socialism"."
 russian_syncretism: "Russian Syncretism"
 russian_syncretism_desc: "\n\n\n\n£GFX_Ideology_russian_syncretism_banner\n\n\n\n\n\n§YRussian Syncretism§! is a specific syncretic set of ideas, that combines nationalist aspects of Russian Empire, and social aspects of Soviet Union. It was born from the ashes of soviet collapse during the perioud of wide anti-Yeltsin opposition, in which many political rivals such as like Zhirinovsky and Zyuganov found common ground. Despite espousing some socialistic views, they decry most marxists as puppets of globalism and russphobes."
 ethno_nationalism: "Ethnonationalism"
 ethno_nationalism_desc: "\n\n\n\n£GFX_Ideology_eth_nat\n\n\n\n\n\n§YEthnic nationalism§!, also known as ethnonationalism, is a form of nationalism wherein the nation and nationality are defined in terms of ethnicity, with emphasis on ethnocentric approach to various political issues related to national affirmation of a particular ethnic group. The central theme of ethnic nationalists is that nations are defined by a shared heritage, which usually includes a common language, a common faith, and a common ethnic ancestry. It also includes ideas of a culture shared between members of the group, and with their ancestors."
 falangist: "Falangism"
 falangist_desc: "\n\n\n\n£GFX_Ideology_falangism\n\n\n\n\n\n§YFalangism§! is a sub-variant of Classical Fascism that originated in but isn't limited to, Spain. Stressing a Roman Catholic religious identity and the supreme authority of the state over the nation, it emphasizes strong social hierarchies, hyperconservatism, anti-communism, anti-liberalism, and traditionalism. It calls for the use of political violence to revive a national identity, as well as a national syndicalist economy that advocates for agrarian reforms, industrialism, and respect for private property. The ideology also calls for the eradication of class divisions through the establishment of a corporatist system where different sectors of society collaborate under the guidance of the state."
 chinese_exceptionalism: "Chinese Exceptionalism"
 chinese_exceptionalism_desc: "\n\n\n\n£GFX_Ideology_Chinese_Exceptionalism\n\n\n\n\n\n§YChinese Exceptionalism§! is a concept that emphasizes the unique historical, cultural, and political characteristics that distinguish China from other nations. Unlike Western exceptionalism, which often emphasizes individual freedoms and democratic governance, Chinese exceptionalism is rooted in the country's millennia-old civilization and perceived cultural, and sometimes racial, superiority. Central to Chinese exceptionalism is the idea of China's historical continuity, believing in an inherent cultural greatness and that it is the moral duty of the Han people to carry out its will to whatever is deemed necessary. This philosophy often stresses ultranationalism and the idea of the ''Chinese nation'', a supranational cultural entity. Positing the idea that deviating from the Han identity would only impede China's rise, certain proponents are split on the idea of a peaceful rise, with some stating that it is too late for the Chinese nation to embrace such an idea, and that only through bloodshed will China claim its destined glory."
 ultranationalism: "Ultranationalism"
 ultranationalism_desc: "\n\n\n\n£GFX_ideology_ultranationalism_banner\n\n\n\n\n\n§YUltranationalism§! - is an extreme and radical form of nationalism that promotes the belief in the superiority of one's own nation or ethnic group above all others. It emphasizes the importance of preserving the cultural, racial, and territorial identity of the nation at all costs, often advocating for aggressive and expansionist foreign policies to assert dominance on the global stage. Ultranationalism is characterized by a fervent and fanatical loyalty to the nation, often bordering on xenophobia and authoritarianism."
 blackhundredism: "Black-Hundredist Nationalism"
 blackhundredism_desc: "\n\n\n\n£GFX_ideology_blackhundredism_banner\n\n\n\n\n\n§YBlack-Hundredist Nationalism§! is a highly authoritarian, ultranationalist, reactionary, monarchist, and economically conservative ideology that was based on the Black Hundreds movement in early 20th-century Russia.\n\nThis ideology combines elements of monarchism, ethnic nationalism, and traditionalism. It sees itself as a reaction against neobolshevism, globalization, and perceived threats to Russian identity.\n\nIt is rooted in strong support for the House of Romanov and a fierce opposition to any form of democratic rule. It also emphasized extremist views that often included xenophobic and prejudiced beliefs, such as strong anti-Minor Nation rhetoric, anti-Semitic, and anti-Masonic ideals."
 derzhavism: "Derzhavism"
 derzhavism_desc: "\n\n\n\n£GFX_ideology_derzhavism_banner\n\n\n\n\n\nThe doctrine of §YDerzhavism§! is, first of all, the doctrine of the complete subordination of state power to the will of one person appointed by a certain "Political passionist" and the steering wheel of society.\n\nThe Derzhavists advocate ultranationalism and complete isolation of the country from the outside world. A totalitarian order is being imposed in society: "Everything is for the state, nothing is outside the state." The governing bodies - the party or the state council - under the full control of the cult of the leader play the role of performers, leaders and mobilizers. Broad organizations affiliated or controlled by the state monitor the people or parts of it.\n\nIn economics, they can be divided into two groups. Some advocate the preservation of the current state model, where there is no place for private initiative. Others advocate the creation of national capitalism. In such a system, the interests of domestic business come to the fore. At the same time, new state corporations become monopolists and play a key role in the economic development of the country."
 national_derzhavism: "National Derzhavism"
 national_derzhavism_desc: "\n\n\n\n£GFX_ideology_derzhavism_banner\n\n\n\n\n\n"...Your body and soul must be dedicated in order for the National Revolution to succeed. The revolution is not only for society, but for the soul and the nature of Russia itself. The nation must become a strong fortress - no dissent or doubt, only the leader and your fellow comrades are your anchors in this revolution."\n- Excerpt From Yellow Guard Manifesto".\n\n§YNational Derzhavism§! focuses on revolutionary aspects of the ideology, influenced heavy by the Yellow Guard faction that predominatly leads it. They believe in the revival of Russian national culture and the transformation of the Motherland into a warrior state, led by a powerful individual. Their main methods of revolution are a constant barrage of propaganda, rallies, military training, and sports tournaments throughout the country. They focus less on religious issues and instead emphasize the feeling of being Russian and the unity of the culture.\n"
 revivalist_derzhavism: "Revivalist Derzhavism"
 revivalist_derzhavism_desc: "\n\n\n\n£GFX_ideology_derzhavism_banner\n\n\n\n\n\n"Our Orthodox faith... our sacred Russia is recovering against all odds from within and without. We stand alone among the heathens and sinners of the world, but we must not falter, for our golden dawn is near. The nation of Katehon is approaching, ready to stop the forces of Antichrist."\nPassage from the Sermon of Pro-Derzhavist Priest.\n\n§YRevivalist Derzhavism§! places great emphasis on Russia's main religious roots in Orthodox Christianity, but it also makes changes to it in order to fit its narrative. It radically reinterprets the concept of "Fortress-Russia" and makes it a katechonic concept, the leading force against the Antichrist and his followers. The nation is seen as being must be battle-ready and sacrificially in order to stop the forces of evil. Other religions are actively ignored or placed on the side of the enemy, such as other Christian denominations openly declared to be heathen. Revivalists also do not shy away from the militarization of religion and religious institutions, all for the sake of having a sacred army ready to unleash a crusade against the enemies of the state."
 ultra_putinism: "Ultra-Putinism"
 ultra_putinism_desc: ""
 fascist_populism: "Fascist Populism"
 fascist_populism_desc: "\n\n\n\n£GFX_ideology_fascist_populism_banner\n\n\n\n\n\n§YFascist Populism§! is a political style in which a charismatic leader positions themselves as the singular embodiment of the nation and the sole remedy to its perceived decline. Unlike doctrinaire fascism, fascist populism selectively borrows elements of the fascist tradition-national rebirth, denunciation of internal "rot," exaltation of unity and loyalty-while softening, obscuring, or rebranding its more rigid ideological commitments. This flexibility allows the leader to appeal simultaneously to disaffected citizens seeking stability and to supporters receptive to more exclusionary or authoritarian undertones."
 naturalized_derzhavism: "Naturalized Derzhavism"
 naturalized_derzhavism_desc: "\n\n\n\n£GFX_ideology_naturalized_derzhavism_banner\n\n\n\n\n\nWhile §YDerzhavism§! is a distinctly Russian ideology, this does not mean its methods cannot be used elsewhere. §YNaturalized Derzhavism§! proves this. States that adopt Derzhavist practices are often closely allied to Alikhanov's regime and are often directly established or sponsored by them.\nWhile implementation may vary depending on national characteristics and the level of independence, the core beliefs in these countries include extreme nationalism and often dictatorial rule, and a strong national party is created to lead the country towards the revival of its culture."
 intergral_nationalism: "Intergral Nationalism"
 intergral_nationalism_desc: "\n\n\n\n£GFX_Ideology_eth_nat\n\n\n\n\n\n§YIntegral Nationalism§! is a syncretic ideology combining extreme nationalism with authoritarian traditionalism. In modern times, Integral Nationalists are most concerned with the fragmentation of national identity, and what they see as liberalism and pluralism eroding social cohesion and the spiritual unity of the state. Viewing the nation as an organic, living entity, they reject parliamentary democracy and individual rights in favor of absolute loyalty to a centralized authority./nConcerned about internal decay and foreign influence, many Integral Nationalists argue that only strict hierarchy and cultural uniformity can preserve national strength. They believe that the only way to secure the nations future is through the subordination of personal freedoms to collective destiny, the restoration of traditional values, and the consolidation of power in a strong, unifying leadership that embodies the will of the nation."
 
