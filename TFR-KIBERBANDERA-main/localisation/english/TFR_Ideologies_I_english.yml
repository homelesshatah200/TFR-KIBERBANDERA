l_english:
 #Totalitarian Socialist

 totalitarian_socialist: "Totalitarian Socialist"
 totalitarian_socialist_noun: "Totalitarian Socialism"
 totalitarian_socialist_desc: "Totalitarian Socialist Regime"
 totalitarian_socialist_drift: "Drift towards Totalitarian Socialism"
 totalitarian_socialist_color: "§d"
 totalitarian_socialist_color_color_name: "§d$totalitarian_socialist$§!"

 #Totalitarian Socialist Sub Ideologies

 jucheism: "Juche"
 jucheism_desc: "\n\n\n\n£GFX_Ideology_juche\n\n\n\n\n\n§YJuche§! is a Korean form of Marxism-Leninism that heavily enphasises national self-reliance. Economically, advocates for Juche argue that in order to implement the principle of economic self-sufficiency, one must build an independent national economy, although it does not rule out foreign trade. Additionally, Juche considers human beings in general the driving force in history. It is summarized as the popular masses are placed in the center of everything, and the leader is the center of the masses. The theory turns the Great Leader into an absolutist, supreme leader. The working class is not to think for themselves, but instead to think through the Great Leader. The Great Leader is the top brain of the working class, meaning that he is the only legitimate representative of the working class."
 
 maoism: "Maoism"
 maoism_desc: "\n\n\n\n£GFX_Ideology_maoist\n\n\n\n\n\n§YMaoism§! is an advanced form of Marxism-Leninism synthesized by Peruvian theorist and guerllia fighter Chairman Gonzalo in 1982. It builds off the earlier theories of Marxism-Leninism and Mao ZeDong thought, and states that Mao's writings were universally applicable. It's key principles are Protracted People's War, which advocates for a guerllia war against the Capitalist states, Cultural Revolution to rid culture from bourgoise influence, and the Mass Line, which argues that a Vanguard Party must outline a strategy for the revolutionary leadership of the masses, consolidation of the dictatorship of the proletariat and strengthening of the party and for the building of socialism."
 
 jacobinism: "Jacobinism"
 jacobinism_desc: "\n\n\n\n£GFX_Ideology_jacobin\n\n\n\n\n\n§YJacobinism§! traces its heritage back to the 1789 with the French Revolution. Placing heavy emphasis on civic nationalism, patriotism and the struggle for §YNational Sovereignty§! in an increasingly hostile world, Jacobin regimes turn to authoritarian methods of control in order to preserve the revolution against its enemies. In order to protect the revolution and forge a new world, Jacobin regimes utilize extensive use of mass surveillance systems, secret police and webs of informants, as well as seeking to control every sector of life, from economics to family dynamics. Paradoxically, Jacobinism draws its legitimacy primarily through populism, resorting to populist measures in order to placate the people, favoring wealth redistribution, extensive social safety nets, as well as more conservative social policies in order to maintain the support of their primarily rural bases of support. While many similarities to the original Jacobinism of the French Revolution do remain, the new Jacobinism of the 21st Century represents a synthesis of the old and the new - the ushering in of a communist society, no matter how high the cost may be."

 totalism: "Vanguardist Socialism"
 totalism_desc: "\n\n\n\n£GFX_Ideology_totalist\n\n\n\n\n\n§YVanguardist Socialism§! is a form of socialism which argues for the totality of the state above all else. Vanguardists argue that the resources of the entire country must be used to build up the §YSocialist Security State§!, in all aspects of society, from societal attitudes to planning the economy. Vanguardist governments generally use high-tech authoritarian methods to control and monitor their citizens, such as widespread CCTV surveillance and internet censorship."

 eurasianism_left: "Neo-Eurasianism"
 eurasianism_left_desc: "\n\n\n\n£GFX_Ideology_neo_eurasianism\n\n\n\n\n\n§YNeo-Eurasianism§! is an ideology born from post-soviet political thought, its tenets are to place themselves against the Global Eurocentric Liberalism, dubbed by them as 'Atlanticism' and its attempts to establish hegemony of rimland over heartland people. They oppose uniformization of mankind, and instead focus on cherishing and safeguarding cultural and ethnical diversity of the Continent. Staunchly anti-capitalists and pro-collectivists, Eurasianists will seek all methods possible to unify Eurasia, and protect it from Atlanticist threats."

 left_wing_junta: "Left-Wing Military Junta"
 left_wing_junta_desc: "\n\n\n\n£GFX_Ideology_left_wing_junta\n\n\n\n\n\nA §YLeft-Wing Military Junta§! is an ideological concept that combines elements of left-wing politics with the structure and authority of a military junta. This unique combination seeks to establish a government system that prioritizes socialist principles, equality, and social justice, while also maintaining a disciplined and centralized decision-making process typically associated with military regimes.\n\nThe primary objective of a Left-Wing Military Junta is to address socio-economic disparities, eliminate class divisions, and promote the welfare of the working class. It aims to achieve these goals through a centralized authority that can efficiently implement policies and reforms without being hindered by bureaucratic processes or political opposition. The military, as the backbone of this junta, plays a crucial role in ensuring stability, protecting the revolution, and safeguarding the interests of the people."

 social_fascism: "National-Communism"
 social_fascism_desc: "\n\n\n\n£GFX_Ideology_social_fascism\n\n\n\n\n\n§YNational-Communism§! is an ideological framework that seeks to combine the principles of communism with a strong sense of national identity and patriotism. It emphasizes the importance of both economic equality and national sovereignty, aiming to establish a society where the working class holds power, while also preserving the cultural heritage and interests of the nation.\nAt its core, National-Communism advocates for the abolition of private ownership of the means of production, advocating for a collective ownership system where workers control and benefit from their labor. It seeks to eliminate class distinctions and create a society where wealth and resources are distributed equally among all members. This ideology places great emphasis on social justice, aiming to eradicate poverty, exploitation, and social inequalities."
 
 neo_stalinism: "Neo-Stalinism"
 neo_stalinism_desc: "\n\n\n\n£GFX_ideology_neo_stalinism_bannner\n\n\n\n\n\n§YNeo-Stalinism§! is an ideological framework that draws inspiration from the ideas and policies of Joseph Stalin, the former leader of the Soviet Union. It represents a revival or reinterpretation of Stalinist principles in the contemporary context.\nAt its core, Neo-Stalinism upholds the belief in a strong centralized state and the use of authoritarian measures to achieve societal goals. It places a heavy emphasis on state control and planning, advocating for the nationalization of key industries and the implementation of a command economy. Neo-Stalinists argue that a powerful state is necessary to ensure social stability, economic development, and the advancement of socialism."

 transhumanism: "Transhumanism"
 transhumanism_desc: "\n\n\n\n£GFX_Ideology_transhumanism\n\n\n\n\n\n§YTranshumanism§!.\nIt is debated for a long time where the first spark of Transhumanist thought came to be, from the futurists in the twentieth century that desired to be as machines to the modern day digital philosophers on the fringes of societies that see the merge of man and machine as an logical end result of evolution.\n\nNevertheless, it is something that was deemed a distant reality.\nUntil now.\n\nTranshumanism argues for the modification and enhancement of the human mind, body and soul by technological means, influenced by seminal works of science fiction, the transhumanist vision of a transformed future humanity has gained the support and opposition of philosophers and religious believers alike.\n\nWith its recent rise to prominence, and its dedication to scientific advancement no matter the cost, the question remains on whether humanity can keep up the pace of this ideal.\nIts critics fear the potential resurgence of discriminatory attitudes for the sake of progress and the potential of the human race losing its humanity."

 chekist_communism: "Chekist Communism"
 chekist_communism_desc: "\n\n\n\n£GFX_Ideology_chekist_communism\n\n\n\n\n\n§YChekist Communism§! - is a state system in which the socialist state is headed by state security agencies that have unlimited power over all spheres of society: from offices and party meetings to kitchens and bedrooms. Everyone must be subordinate to the general line of the party and the Leader: foreign elements must be eradicated for the good of the people and the state. The collective is above the individual. In economics, supporters of Chekist Communism adhere to Stalinist methods: economic centralization, a planned economy, and harsh punishments for failures and embezzlement of the national economy.\nIn general, an atmosphere of fear reigns in the country: informants and mass repression keep the population under control."

 #Authoritarian Socialist
 communist: "Authoritarian Socialist"
 communist_noun: "Authoritarian Socialism"
 communist_desc: "Authoritarian Socialist Regime"
 communist_drift: "Drift towards Authoritarian Socialism"
 communist_color: "§R"
 communist_color_name: "§R$communist$§!"

 #Authsoc Subideologies

 market_socialism: "Market Socialism"
 market_socialism_desc: "\n\n\n\n£GFX_Ideology_Dengism\n\n\n\n\n\n§YMarket Socialism§!, often coliqually called Dengism, covers a wide range of socialist thought that incorporates markets into a socialist economy. It argues that at the current stage of societal and economical development, the country is not prepared to adopt full planned socialism, and must adopt certain capitalistic reforms in order to develop the productive forces of a country. Market Socialist countries typically participate in the global economy, have private property and private buisnesses, yet the government directs and indirectly controls the buisnesses."
 marxism_leninism: "Marxism-Leninism"
 marxism_leninism_desc: "\n\n\n\n£GFX_Ideology_ML\n\n\n\n\n\n§YMarxism-Leninism§! is the ideology behind most communist movements throughout the 20th century and was the official state ideology of the Soviet Union. Created in the 1920s when Stalin synthesized the works of Marx and Lenin, Marxist-Leninists advocate for the overthrow of capitalism and replacing it with a transitionary dictatorship of the proletariat, which will theoretically whither away when society is developed enough to implement communism."
 neo_socialism: "Neo-Socialism"
 neo_socialism_desc: "\n\n\n\n£GFX_ideology_neo_socialismsub\n\n\n\n\n\n§YNeo-Socialism§! is a modern form of socialism that deviates from classical Marxism in argueing that class is not the primary or single main contradiction within society. Neosocialists believe that race, sexuality or gender are also primary contradictions, and must also be resolved before communism can successfully be implemented"
 left_nationalism: "Left-Wing Nationalism"
 left_nationalism_desc: "\n\n\n\n£GFX_Ideology_left_nationalist\n\n\n\n\n\n§YLeft-Wing Nationalism§! is a broad term for movements which combine elements of leftist thought, such as redistribution of wealth, nationalization of major industries, and class warfare, with elements of nationalism. Typically used by developing countries, it seeks to unite people on the basis of nationality agaainst percieved colonialist aggression while also carrying out leftist reforms within the country."
 trotskyism: "Trotskyism"
 trotskyism_desc: "\n\n\n\n£GFX_Ideology_trotskyismsub\n\n\n\n\n\n§YTrotskyism§! is an ideological framework that emerged from the ideas and beliefs of Russian revolutionary Leon Trotsky. It is rooted in the principles of Marxism and seeks to advance the goals of international socialism and permanent revolution.\n\nAt its core, Trotskyism emphasizes the need for a global working-class revolution to overthrow capitalist systems and establish a worldwide socialist society. It rejects the concept of socialism in one country, arguing that true liberation can only be achieved through the collective efforts of the proletariat across national boundaries."
 orthodox_leninism: "Orthodox Leninism"
 orthodox_leninism_desc: "\n\n\n\n£GFX_Ideology_ML\n\n\n\n\n\n§YOrthodox Leninism§! constituted the ideological foundation of numerous communist movements throughout the twentieth century, serving as the official state doctrine of the Soviet Union. Adherents to this ideology regarded themselves as unwavering supporters of the revolutionary spirit, resolutely rejecting any non-Leninist concepts embraced by subsequent socialist regimes."
 anti_revisionist_communism: "Anti-Revisionist Communism"
 anti_revisionist_communism_desc: "\n\n\n\n£GFX_ideology_neo_stalinism_bannner\n\n\n\n\n\n§YAnti-Revisionism§! is a reaction to the diverse ideological movements that purport to be the heirs of Marxism, the anti-revisionist movement advocates for the preservation of the fundamental tenets of the original revolutionary doctrine. They vehemently oppose the integration of capitalist economic principles into socialist societies. This ideology is not only defined by its positive aspects, but also by its negation of certain elements."
 left_baathism: "Left-Wing Ba'athism"
 left_baathism_desc: "\n\n\n\n£GFX_ideology_left_baathism_banner\n\n\n\n\n\n§YLeft-Wing Ba'athism§! is an ideology that combines elements of socialism and Arab nationalism, with a focus on social justice, equality, and unity among Arab nations. It emerged as a political ideology in the mid-20th century, particularly in countries such as Syria and Iraq.\nAt its core, Left-wing Ba'athism seeks to address socio-economic disparities within society, advocating for the redistribution of wealth and resources to ensure a more equitable society. It emphasizes the importance of social welfare programs, public ownership of key industries, and the provision of basic services to all citizens."
 gaddafism: "Gaddafism"
 red_derzhavism: "Popular Derzhavism"
 red_derzhavism_desc: "\n\n\n\n£GFX_ideology_derzhavism_banner\n\n\n\n\n\n"A true nation must care for its working class, as they are the main source of its strength and power. Without economic justice, no great power can be maintained for long, and no leader can truly ensure the position of people's leadership."\n-Fragment From the Speech Given During KDD Meeting\n\n§YPopular Derzhavism§! is a revisionist left-wing nationalist movement that differs from mainstream Derzhavist thought. Unlike most Derzhavists, they believe that learning from the Soviet era of Russia has some value, while also incorporating more hard-line socialist ideologies around the world. However, they do not reject basic principles of Derzhavinism, such as Russian nationalism and personalistic dictatorship. This unholy pot of ideas has some followers, many of whom are old nationalistic socialists or communists who, despite everything, still support the new government. But this is the weakest strain of Derzhavists divide."
 putinism_neosoviet: "Neo-Soviet Putinism"
 putinism_neosoviet_desc: ""
 populist_sovietism: "Populist Sovietism"
 populist_sovietism_desc: "\n\n\n\n£GFX_ideology_populist_sovietism_banner\n\n\n\n\n\n§YPopulist Sovietism§! is a political style in which a leader presents themselves as the guardian of a lost era-an era idealized as one of dignity, social justice, and collective purpose. Its foundation lies not in a strict revival of Marxist–Leninist doctrine, but in the emotional resonance of the Soviet past: the memory of stability, guaranteed employment, shared sacrifice, and a state that ostensibly protected the "ordinary person." By invoking this imagery, the leader cultivates a sense of historical continuity and moral legitimacy, positioning themselves as the heir to a vanished order that must be symbolically restored."
 #Libertarian Socialism

 libertarian_socialist: "Libertarian Socialist"
 libertarian_socialist_noun: "Libertarian Socialism"
 libertarian_socialist_desc: "Libertarian Socialist Government"
 libertarian_socialist_drift: "Drift towards Libertarian Socialism"
 libertarian_socialist_color: "§t"
 libertarian_socialist_color_name: "§t$libertarian_socialist$§!"
 
 #Libsoc Subideologies
 
 left_anarchist: "Anarcho-Communism"
 left_anarchist_desc: "\n\n\n\n£GFX_Ideology_Ancom\n\n\n\n\n\n§YAnarcho-Communism§! is a left anarchist ideology which advocates for the abolition of the state, capitalism, wage labour, social hierarchies and private property, while supporting direct democracy and horizontally organized economies. Historically, movements such as the CNT-FAI in civil war era Spain, the Black Army in Ukraine during the Russian Civil War, and the Korean Anarchist Federation in Manchuria during the Second World War have used Anarcho-Communism in some way or another."
 post_leftism: "Neo-Marxism"
 post_leftism_desc: "\n\n\n\n£GFX_ideology_neomarxist_banner\n\n\n\n\n\n§YNeo-Marxism§! is an ideological movement that emerged in the 20th century as a revisionist interpretation of traditional Marxist theory. It seeks to address the limitations and shortcomings of classical Marxism, while still advocating for a radical transformation of society based on socialist principles.\nAt its core, Neo-Marxism emphasizes the importance of social class and economic factors in shaping societal dynamics. However, it expands upon classical Marxism by incorporating other forms of oppression, such as race, gender, and sexuality, into its analysis. Neo-Marxists argue that these intersecting systems of oppression contribute to the perpetuation of inequality and exploitation within capitalist societies."
 eurocommunism: "Eurocommunism"
 eurocommunism_desc: "\n\n\n\n£GFX_ideology_eurocommunism_banner\n\n\n\n\n\n§YEurocommunism§! is a political-ideological project of Marxism intermediate between Leninism and democratic socialism, i.e., a communism developed in a reformist and democratic sense by some communist organizations in Western Europe. It is characterized by greater proximity to a social middle class that has emerged from capitalism and by the adoption of a multi-party parliamentary model. The Eurocommunists want to embody a so-called "third way" between Marxism-Leninism and the social-democratic tradition. Despite its history, this ideology is still considered to be emerging."
 communist_populism: "Communist Populism"
 communist_populism_desc: "\n\n\n\n£GFX_ideology_communist_populism_banner\n\n\n\n\n\n§YCommunist Populism§! represents an ideological synthesis of the Marxist-Leninist tradition and populist narrative, making it politically accessible and rhetorically appealing to the masses. In terms of content, it remains within the realm of radical socialist criticism of capitalism and class expropriation of the means of production, but in form and tactics, it is a simplified, pragmatic, and people-oriented version of Leninism: less discrediting of procedural democracy, broader mobilization of the "people" as a political subject, temporary acceptance of market instruments for the sake of rapid socialization of success, and priority given to operational, materially targeted measures that produce rapid social effects."
 reformist_socialism: "Democratic Socialism"
 reformist_socialism_desc: "\n\n\n\n£GFX_Ideology_reformist_socialism\n\n\n\n\n\n§YDemocratic Socialism§!, or Reformist Socialism, is an ideology that argues for the creation of socialism within the liberal parlimentary system. By participating in electoral politics, worker cooperatives, and worker self-management, democratic socialists seek to transform the capitalist economy into a decentralized, worker run, market economy. While having socialism as a long-term goal, reformist socialists are more concerned about curbing capitalism's excesses, and are supportive of progressive reforms to humanise it in the present day. Reformist socialists argue that capitalism is inherently incompatible with the values of freedom, equality and solidarity, and that these ideals can only be achieved through the realisation of a socialist society. "
 eco_socialism: "Eco-Socialism"
 eco_socialism_desc: "\n\n\n\n£GFX_Ideology_eco_socialism\n\n\n\n\n\n§YEco-socialism§!, also known as Green Socialism, is a syncretic ideology of Socialism and Environmentalism, positing that the ever-expanding nature of capitalism is the cause of environmental degradation, such as climate change, global warming, the depletion of resources and the loss of global biodiversity. It also opposes globalization and imperialism, stating that they are incompatible with the ecological requirements of human civilization to sustain itself. Eco-socialists advocate for the abolition of capitalism and globalization, proposing a society based on egalitarianism, social progressivism, and common ownership of the means of production. Eco-socialists are also anti-bureaucratic, especially against forms of socialism they deem bureaucratic collectivism, and usually classify themselves as Orthodox Marxists."
 popular_front_socialism: "Popular Front Socialism"
 popular_front_socialism_desc: "\n\n\n\n£GFX_Ideology_reformist_socialism\n\n\n\n\n\n§YPopular Front Socialism§! is a broad coalition movement that embraces and advocates as many socialist ideas as possible to foster unity among left-wing forces and their supporters. Although many of these systems and parties are inherently unstable, if the movement can tap into the ideal of socialist democracy or at least adopt socialist platformism, it stands a chance of enduring and achieving significant goals within the nation it governs."
 labour_syndicalism: "Labour Syndicalism"
 labour_syndicalism_desc: "\n\n\n\n£GFX_Ideology_Ancom\n\n\n\n\n\n§YLabour Syndicalism§! is an ideology that combines traditional socialist principles with more unique forms of governance through labour unions and other worker organizations. These systems are often highly decentralized, with the state playing a role in supporting worker organizations. Although not necessarily non-Marxist, these systems draw on revisionist ideas from non-Marxist thinkers, such as anarchists and syndicalist economists and philosophers."
 left_accelerationist: "Left Accelerationism"
 left_accelerationist_desc: "\n\n\n\n£GFX_Ideology_left_accelerationist\n\n\n\n\n\n§YLeft Accelerationism§! is an ideology born from the contradictions of late-stage capitalism.\n\nWhile others seek to destroy capitalism outright or return to an imagined past, Left Accelerationists believe the only way forward is through, accelerating technological development, automation, and economic progress to transcend capitalism itself.\n\nPromoting constant change and a rejection of stagnation, it sees capitalism as a force of entropy and among the more radical followers potentially even a malicious entity that has held organic life in a death grip.\n\nIn this school of thought, Mark Fisher's critiques of capitalist realism are used to reject the notion that capitalism cannot be altered. It views the system as a decaying structure capable of being driven beyond its limits in order to reveal new forms of social empowerment, political power, and technological development. Capitalism's grip can be escaped through post-scarcity economics, automation, and artificial intelligence."
 sovereign_democracy_left: "Sovereign Democracy"
 sovereign_democracy_left_desc: "\n\n\n\n£GFX_Ideology_left_sovdem\n\n\n\n\n\n§YSovereign Democracy§! is a niche political ideology which goal is to create a "perfect" democracy that ignores western democratic party bickering. Parties not only have similar views, but also cooperate and work for the betterment of the state as a whole. The civilian society serves as a check on the parties, using their influence to oust corrupt and unpatriotic officials for example.\nThe Left party advocates for a more closed market akin to the Soviet era. It is catered to a left-wing audience that wishes the return of "communism" but without any downsides."
 sovereign_democracy_lukashenko: "People's Communism"
 sovereign_democracy_lukashenko_desc: "\n\n\n\n£GFX_Ideology_left_sovdem\n\n\n\n\n\n§YSovereign Democracy§! is a niche political ideology which goal is to create a "perfect" democracy that ignores western democratic party bickering. Parties not only have similar views, but also cooperate and work for the betterment of the state as a whole. The civilian society serves as a check on the parties, using their influence to oust corrupt and unpatriotic officials for example.\nThe Left party advocates for a more closed market akin to the Soviet era. It is catered to a left-wing audience that wishes the return of "communism" but without any downsides.\n\nLukashenko's §YPeople's Communism§! is based on reviving the old Soviet system with a new coat of paint, while retaining the basis of unique democracy and adopting more modern examples of socialist practices. However, it relies on the inner system of the party to keep the system stable."
 sovereign_democracy_prilepin: "Social Nationalism"
 sovereign_democracy_prilepin_desc: "\n\n\n\n£GFX_Ideology_left_sovdem\n\n\n\n\n\n§YSovereign Democracy§! is a niche political ideology which goal is to create a "perfect" democracy that ignores western democratic party bickering. Parties not only have similar views, but also cooperate and work for the betterment of the state as a whole. The civilian society serves as a check on the parties, using their influence to oust corrupt and unpatriotic officials for example.\nThe Left party advocates for a more closed market akin to the Soviet era. It is catered to a left-wing audience that wishes the return of "communism" but without any downsides.\n\nPrilepin's platform of §YSocial Nationalism§! relies heavily on the patriotism and military qualities of the Russian population, as well as the search for syncratic politics similar to Russian history and politics."
 sovereign_democracy_platoshkin: "New Socialism"
 sovereign_democracy_platoshkin_desc: "\n\n\n\n£GFX_Ideology_left_sovdem\n\n\n\n\n\n§YSovereign Democracy§! is a niche political ideology which goal is to create a "perfect" democracy that ignores western democratic party bickering. Parties not only have similar views, but also cooperate and work for the betterment of the state as a whole. The civilian society serves as a check on the parties, using their influence to oust corrupt and unpatriotic officials for example.\nThe Left party advocates for a more closed market akin to the Soviet era. It is catered to a left-wing audience that wishes the return of "communism" but without any downsides.\n\nPlatoshkin bases his rule on his own theory of §YNew Socialism§! - a more modernized version of socialism encountered in the 21st century - while also maintaining the Russian-centered politics within his system and party."
 confucian_socialism: "Confucian Socialism"
 confucian_socialism_desc: "\n\n\n\n£GFX_Ideology_confucian_socialism\n\n\n\n\n\n§YDuring the chaotic times of the Spring and Autumn period§!, The Zhou dynasty was in decline, and the rituals that once held society together were in disarray. Amid this national crisis, Confucius of Lu raised his voice and called for action. For fourteen years, he traveled across various states, vowing to restore the Zhou rites, promote benevolence, and preach righteousness. Soon, the name of Confucius spread throughout the land. The principles of Confucianism, aimed at alleviating suffering and providing salvation, began to flourish and eventually became a dominant school of thought.\n\nAs time passed and many heroes and remarkable figures faded into history, China faced turmoil, and the republic was plunged into severe hardship. Yet, there were still righteous individuals who upheld the Five-Star Red Flag as the symbol of legitimacy, pledging their lives to call for justice, moral principles, and the revival of socialism on Chinese soil. Their words, actions, and ambitions mirrored those of the ancient sage Confucius, evoking the enduring strength of high mountains and flowing rivers.\n\nWhether through Confucian ethics or communist ideology, both have deeply rooted themselves in the hearts and minds of the Chinese people. This is indeed an opportune moment to carry forward the grand tradition of Chinese orthodoxy amidst these chaotic times. The people's front and class struggle championed by Mao and Deng, combined with the benevolent governance and moral teachings advocated by Confucius and Mencius - self-cultivation, family regulation, state governance, and world peace - will surely unite the Chinese people with a common will, forming a cohesive entity once again and sweeping away all obstacles."
 #Socdem Bernie Sanders Nordic Whatever 

 social_democrat: "Social Democrat"
 social_democrat_noun: "Social Democracy"
 social_democrat_desc: "Social Democracy"
 social_democrat_drift: "Drift towards Social Democracy"
 social_democrat_color: "§s"
 social_democrat_color_name: "§s$social_democrat$§!"

 #Social Democratic Sub Ideologies
 left_centrist: "Left-Centrism"
 left_centrist_desc: "\n\n\n\n£GFX_Ideology_left_centrism\n\n\n\n\n\n§YLeft-Centrism§!, otherwise known as Centre-left Politics, is a wide array of ideologies covering Social Democracy, Progressivism, Social Liberalism, and Environmentalism, aiming to unite these ideals through syncretism. Broadly, Left-Centrism leans closer to the political center in contrast with Far-leftist beliefs such as Communism and Revolutionary Socialism. Left-centrism conforms with progressive social beliefs, supporting a mixed economy with policies such as strong economic interventionism, welfare capitalism, and pro-unionism. They support open-border immigration policies and multiculturalism, with examples of this including Germany. Those on the center-left also believe in working within the established systems to improve social justice, with Left-Centrist parties supporting a mixed social policy, though most conform to neoliberalism."
 left_populism: "Left-Wing Populism"
 left_populism_desc: "\n\n\n\n£GFX_Ideology_left_populism\n\n\n\n\n\n§YLeft-wing Populism§! combines elements of populist rhetoric and themes with leftist ideology. Generally, left-wing populism is anti-elitest, skepitcal of globalism, and anti-establishment. Left-wing Populism is extremely anti-militaristic, forming mainly out of opposition to American military intervention in the late 90s and early 2000s. Left-wing populists seek to eliminate the wealth gap through wealth redistribution, social programs, and big government."
 progressivism: "Progressivism"
 progressivism_desc: "\n\n\n\n£GFX_Ideology_progressivism\n\n\n\n\n\n§YProgressivism§! is a socially liberal, identity politics based ideology that seeks to establish social justice through government intervention and government programs. Largely assosiated with social justice and feminist movements, they are typically pro-choice, and see advancements in science, technology, and economics as beneficial to human society. Progressives generally tend to support further funding for education, the arts and public health." 
 social_democracy: "Social Democracy"
 social_democracy_desc: "\n\n\n\n£GFX_Ideology_social_democracy\n\n\n\n\n\n§YSocial Democracy§! has been described as left-wing political, social, and economic philosophy within socialism that advocates economic and social interventions to promote social justice within a capitalist-oriented mixed economy. It can be an umbrella term for democracies that adopted both socialist and capitalist policies, sometimes overlapping with social progressive outlook."
 green_politics: "Green Politics"
 green_politics_desc: "\n\n\n\n£GFX_Ideology_green_politics\n\n\n\n\n\n§YGreen Politics§!, or Enviromentalism, is an ideology that focuses on combating man-made climate change in the 21st century, and natural conservatition. They seek to establish a self-sustainable society that is based on the ideals of conservationism, non-violence, grassroots democracy and social justice."
 technocracy: "Technocracy"
 technocracy_desc: "\n\n\n\n£GFX_Ideology_technocracy\n\n\n\n\n\n§YTechnocracy§! is a political and economic system characterized by the leadership of society by experts, scientists, engineers, and other technical professionals. In a technocratic system, decision-making authority is granted to individuals based on their technical expertise and meritocratic performance rather than representatives, with technocratic forms of governance usually being described as oligarchic. Economic planning, resource allocation, and optimization of production processes are integral to a technocratic economy, with a strong centralized bureaucracy also inherent to technocratic states. Most technocratic groups are pragmatic, though a large number of organizations adhering to technocracy are left-leaning or progressive."
 sovereign_democracy_left_socdem: "Sovereign Democracy"
 sovereign_democracy_left_socdem_desc: "\n\n\n\n£GFX_Ideology_left_sovdem\n\n\n\n\n\n§YSovereign Democracy§! is a niche political ideology which goal is to create a "perfect" democracy that ignores western democratic party bickering. Parties not only have similar views, but also cooperate and work for the betterment of the state as a whole. The civilian society serves as a check on the parties, using their influence to oust corrupt and unpatriotic officials for example.\nThe Left party advocates for a more closed market akin to the Soviet era. It is catered to a left-wing audience that wishes the return of "communism" but without any downsides."
 sovereign_democracy_delyagin: "Moderate Socialism"
 sovereign_democracy_delyagin_desc: "\n\n\n\n£GFX_Ideology_left_sovdem\n\n\n\n\n\n§YSovereign Democracy§! is a niche political ideology which goal is to create a "perfect" democracy that ignores western democratic party bickering. Parties not only have similar views, but also cooperate and work for the betterment of the state as a whole. The civilian society serves as a check on the parties, using their influence to oust corrupt and unpatriotic officials for example.\nThe Left party advocates for a more closed market akin to the Soviet era. It is catered to a left-wing audience that wishes the return of "communism" but without any downsides.\n\nThe Delyagin administration focuses on moderately improving the lives of average Russians and securing democratic reforms, as well as maintaining the presence of different opinions within the government."
 sovereign_democracy_konovalov: "Socialist Reformism"
 sovereign_democracy_konovalov_desc: "\n\n\n\n£GFX_Ideology_left_sovdem\n\n\n\n\n\n§YSovereign Democracy§! is a niche political ideology which goal is to create a "perfect" democracy that ignores western democratic party bickering. Parties not only have similar views, but also cooperate and work for the betterment of the state as a whole. The civilian society serves as a check on the parties, using their influence to oust corrupt and unpatriotic officials for example.\nThe Left party advocates for a more closed market akin to the Soviet era. It is catered to a left-wing audience that wishes the return of "communism" but without any downsides.\n\nKonovalov's reformism wants to bring about a new socialist system by reforming the existing structures, while also maintaining the democratic system and engaging in healthy debates with the opposition."
 sovereign_democracy_grudinin: "Left-Wing Agrarianism"
 sovereign_democracy_grudinin_desc: "\n\n\n\n£GFX_Ideology_left_sovdem\n\n\n\n\n\n§YSovereign Democracy§! is a niche political ideology which goal is to create a "perfect" democracy that ignores western democratic party bickering. Parties not only have similar views, but also cooperate and work for the betterment of the state as a whole. The civilian society serves as a check on the parties, using their influence to oust corrupt and unpatriotic officials for example.\nThe Left party advocates for a more closed market akin to the Soviet era. It is catered to a left-wing audience that wishes the return of "communism" but without any downsides.\n\nGrudinin heavily focuses on improving the agricultural situation and helping to revive the farming community, as well as bringing democratic participation to rural areas."

 neo_socialism_socdem: "Neo-Socialism"
 neo_socialism_socdem_desc: "\n\n\n\n£GFX_ideology_neo_socialismsub\n\n\n\n\n\n§YNeo-Socialism§! is a modern form of socialism that deviates from classical Marxism in argueing that class is not the primary or single main contradiction within society. Neosocialists believe that race, sexuality or gender are also primary contradictions, and must also be resolved before communismcan successfully be implemented."
 putinism_social_democrat: "Left-Wing Putinism"
 putinism_social_democrat_desc: "\n\n\n\n£GFX_Ideology_putinism_social_democrat_banner\n\n\n\n\n\n§YLeft-Wing Putinism§! is a more people-centered interpretation of Putin's doctrine. It envisions a genuine social state dedicated to its citizens. Drawing inspiration from 21st-century socialism and elements of the Soviet experience, it also incorporates Russian specifics.\nTheir political agenda focuses on economic issues, but also underscores the need for reforms to enhance public involvement. They intend to turn ONF into an instrument of the political system's will and promote a meritocratic framework. However, they might also opt for a more centralized and paternalistic model, with a direct presidency and stricter oversight of unreliable bureaucrats.\nThey envision a future of profound Eurasian integration, both economically and politically. Among them, many yearn for the nostalgia of the Soviet era. Their patriotic narratives seek to cultivate a nuanced understanding of the nation's past. However, a leading economist and statesman within their ranks holds a distinctive perspective on Russia's historical legacy, one that is rooted in Fomenko's controversial New Chronology."
 social_patriotism: "Social Patriotism"
 social_patriotism_desc: "\n\n\n\n£GFX_Ideology_social_patriotism_banner\n\n\n\n\n\n§YSocial Patriotism§! is an ideology that combines a deep sense of patriotism with a commitment to social cohesion and national unity. It emphasizes the importance of a strong and united society, where individuals are proud of their nation and work together for its well-being. Social-Patriots believe in the preservation of their country's cultural heritage, traditions, and values, as well as the protection of its territorial integrity and national interests.\nAt the core of Social-Patriotism is a belief in the power of the collective over individual interests. It promotes a sense of solidarity among citizens, encouraging them to prioritize the greater good of the nation over personal gain. Social-Patriots view their fellow countrymen as part of an extended family, connected by shared history, language, and culture."
 reformist_socialism_socdem: "Reformist Socialism"
 reformist_socialism_socdem_desc: "\n\n\n\n£GFX_Ideology_reformist_socialism_socdem\n\n\n\n\n\n§YReformist Socialism§! is a political ideology that operates within a fundamentally capitalist framework. Its proponents do not aim for the immediate abolition of the market as a defining factor in managing production.\nReformist Socialists place democracy at the forefront, stressing the need for workers to have a say in decisions that affect their lives. They believe that workers should have at least some influence over the production of goods and services they create. Generally, Reformist Socialists envision a partnership between political parties and labor unions as the key to achieving social and economic advancement."
 scottish_nationalism: "Scottish Nationalism"
 lukashenkoism_socdem: "Alexander Lukashenko Thought"
 lukashenkoism_socdem_desc: "\n\n\n\n£GFX_ideology_lukashenkism_banner\n\n\n\n\n\n§YAlexander Lukashenko Thought§! or §YLukashekism§! is not a strict ideological structure, but rather a flexible policy founded and created by Alexander Lukashenko and his supporters. In this paradigm, a strong autocrat or president solves the problems of society and tries to create a socially just economy, focusing on the support of the people.\nIn this system, each bureaucrat is evaluated not only by the degree of loyalty, but also by the effectiveness of their work. Anyone can fall under suspicion and be replaced. The only person in the state whose position remains unchanged is the leader."
 #Social Liberalism
 social_liberal: "Social Liberal"
 social_liberal_noun: "Social Liberalism"
 social_liberal_desc: "Social Liberal Democracy"
 social_liberal_drift: "Drift towards Social Liberalism"
 social_liberal_color: "§0"
 social_liberal_color_name: "§0$social_liberal$§!"
 
 #Social Liberal Subideologies old man biden time
 neoliberalism: "Neoliberalism"
 neoliberalism_desc: "\n\n\n\n£GFX_Ideology_neo_liberalism\n\n\n\n\n\n§YNeoliberalism§!, also known as the 'Washington Consensus' is the dominant ideology after the fall of communism. Diametrically opposed to leftism, neoliberalism seeks to implement market reforms, such as removal of price controls, privitization of government controlled industries, deregulation of capital markets, and lowering trade barriers, opening the country up to globalization. Modern neoliberalism uses progressive ideas in order to spread its markets, and vocally support LGBT rights, feminism and minority rights, using the state in order to maintain such social policies. The most prominent neoliberal institutions include the IMF and World Bank, which have enacted reforms throughout the globe. "
 christian_democracy: "Christian Democracy"
 christian_democracy_desc: "\n\n\n\n£GFX_Ideology_chirstian_democracy\n\n\n\n\n\n§YChristian democracy§! is a political ideology based on modern democratic ideas and traditional Christian values and Christian ethics. It came from influences of Catholic social teaching, as well as neo-Calvinism. In practice, Christian democracy is often considered centre-right on cultural, social and moral issues, but centre-left "with respect to economic and labor issues, civil rights, and foreign policy" as well as the environment."
 supervised_democracy_liberal: "Enforced Democracy"
 supervised_democracy_liberal_desc: "\n\n\n\n£GFX_Ideology_enforced_democracy\n\n\n\n\n\n§YEnforced Democracy§!  while similar to Transitional Democracy in that it is authoritarian, is very different. It involves the imposition of ''democratic'' principles through foreign intervention, typically by foreign powers or international organizations. This form of government aims to establish a democratic framework, often accompanied by military intervention or diplomatic pressure, to replace an autocratic regime. Historical examples of enforced democracy include post-conflict interventions in Iraq and Afghanistan, as well as South Vietnam. This process, however, is not without flaws, as it can provoke local resistance, a power vacuum, and at worst brutal insurgencies seen in the aforementioned examples. This is a contentious approach, raising questions about the legitimacy of the imposed ''democratic'' order, as well as how efficient it is at achieving its goals."
 liberal_socialism: "Liberal Socialism"
 liberal_socialism_desc: "\n\n\n\n£GFX_Ideology_liberal_socialism\n\n\n\n\n\n§YLiberal socialism§! is a political philosophy that incorporates liberal principles to socialism. This synthesis sees liberalism as the political theory that takes the inner freedom of the human spirit as a given and adopts liberty as the goal, means and rule of shared human life. Socialism is seen as the method to realize this recognition of liberty through political and economic autonomy and emancipation from the grip of pressing material necessity." #какой долбаёб это переместил блять
 centrist: "Centrism"
 centrist_desc: "\n\n\n\n£GFX_Ideology_centrism\n\n\n\n\n\n§YCentrism§! is a political ideology that serves as a middle ground between the traditional left and right, with its ideals structured around compromise. Rejecting political extremism on all sides, centrism attempts to take a balanced approach to politics, usually in countries torn apart by partisan politics such as France under Emmanuel Macron, who describes himself and his party as centrist. Centrist governments usually promote bipartisanship and moderate socio-economic positions, as well as the philosophy of principled compromise. Centrists usually value political stability above all else, though if a Centrist government is ineffective at pulling the left and the right together, it is almost certain to collapse, figuratively or literally."
 sovereign_democracy_liberal: "Sovereign Democracy"
 sovereign_democracy_liberal_desc: "\n\n\n\n£GFX_Ideology_left_sovdem_liberal\n\n\n\n\n\n§YSovereign Democracy§! is a niche political ideology which goal is to create a "perfect" democracy that ignores western democratic party bickering. Parties not only have similar views, but also cooperate and work for the betterment of the state as a whole. The civilian society serves as a check on the parties, using their influence to oust corrupt and unpatriotic officials for example.\nThe Centrist Party stands for communitarianism, freedom of speech and optimization of power. It is aimed at a more liberal platform, but without western founding and with "healthy" liberalism."
 russian_patriotic_liberalism: "Liberal Populism"
 russian_patriotic_liberalism_desc: "\n\n\n\n£GFX_Ideology_patriotic_democracy_banner\n\n\n\n\n\n§YLiberal Populism§! is a among newest ideological terms cultivated under Navalny's 'Patriotic Democracy'. "Patriotic" in its name stands for government's position to protect Russian statehood and unique identity, as well as to ensure that patriotism is combined with democratic institutions.\n\nLiberal variety is the most centrist and diverse among all of them, having the most liberal state policy, and using equal and versatile parliamentary coalition to expand upon goals of the state, by negotating joint reforms and policies. Liberal economic policies can be described as attempts to build free-market capitalism, while still having to account for people's well-being, and deals with leftist members of the coalition, which may lead to curtailing free-market mechanisms for the sake of social stability and prosperity.\n\nJust like other possible variants, it often places Russian nationality as state-forming, and tries to reduce minorities' praticipation in state affairs, claiming that 'backwards thinking non-core people may try to subdue democratic processes of the country, and destroy our democracy'."
 green_liberalism: "Green Liberalism"
 green_liberalism_desc: "\n\n\n\n£GFX_ideology_green_liberalism_banner\n\n\n\n\n\n§YGreen Liberalism§! is an ideology that combines the principles of liberalism with a strong emphasis on environmental sustainability and ecological responsibility. It seeks to promote individual freedom and economic prosperity while simultaneously ensuring the protection and preservation of the natural world."
 ultra_liberalism: "Ultra-Liberalism"
 ultra_liberalism_desc: "\n\n\n\n£GFX_ideology_ultra_liberalism_banner\n\n\n\n\n\n§YUltra-Liberalism§!, or Radical Liberalism, is a term referring to a subset of Social Liberalism that develops in a country as a result of democracy being threatened or increased autocratization, with proponents of the ideology positing that liberal values must be secured and protected by any means necessary, even if it implies the suppression of dissent and a one-party state through the use of military force. Ultra-liberalism is also supportive of globalism, advocating for the free movement of goods, and people and the fostering of international trade; examples of this being the Schengen Area. Despite these differences, Ultra-liberalism shares much in common with National Liberalism and espouses a pro-corporate mixed economy as well as social progressivism. While this variant of liberalism is incredibly uncommon, it nonetheless has its supporters, especially in a war-torn Europe..."
 ITA_civic_populism: "Civic Populism"
 centrist_pluralism: "Centrist Pluralism"
 centrist_pluralism_desc: "\n\n\n\n£GFX_Ideology_boris_nadezhdin_thought_banner\n\n\n\n\n\n§YCentrist Pluralism§! or §YBoris Nadezhdin Thought§! - is a concept of the political organization of society based on the recognition of the diversity of ideological positions within a single institutional and cultural structure.\n\nUnlike the traditional centrist approach, which presupposes the search for compromises between left and right views, centrist pluralism proceeds from a more radical postulate: not compromise, but coexistence. Within this paradigm, ideological positions ranging from social democracy and moderate conservatism to radical nationalism and Bolshevism are acceptable, provided mutual respect, rejection of political violence, and recognition of a single democratic space as the basis of legitimacy.\n\nIn practice, this ideology has become the theoretical and practical foundation for a horizontal, multi-layered coalition of forces gathered around the figure of Boris Nadezhdin, where each faction, regardless of its views, has the right to vote and representation."
 #Market Liberalism 
 market_liberal: "Market Liberal"
 market_liberal_noun: "Market Liberalism"
 market_liberal_desc: "Market Liberal Democracy"
 market_liberal_drift: "Drift towards Market Liberalism"
 market_liberal_color: "§Y"
 market_liberal_color_name: "§Y$market_liberal$§!"
 
 #Marlib Subideologies
 right_libertarianism: "Right Libertarianism"
 right_libertarianism_desc: "\n\n\n\n£GFX_Ideology_Libertarian\n\n\n\n\n\n§YRight Libertarinaism§!, or libertarian capitalism, is a right wing ideology that defends the free market, the right to hold private property, and small government. Right Libertarians generally want a major reversal to the welfare state, as well as expansions to negative rights. Right-libertarian philosophy is also rooted in the ideas of individual rights and laissez-faire economics. The right-libertarian theory of individual rights generally follow the homestead principle and the labor theory of property, stressing self-ownership and that people have an absolute right to the property that their labor produces"
 right_anarchism: "Right Anarchism"
 right_anarchism_desc: "\n\n\n\n£GFX_Ideology_ancap\n\n\n\n\n\n§YRight Anarchism§!, also commonly known as Anarcho-Capitalism, is a political philosophy which advocates for the market above all else, and a complete abolition of the state. In the absence of statute, anarcho-capitalists hold that society tends to contractually self-regulate and civilize through participation in the free market which they describe as a voluntary society. The system of private property would still exist and be enforced by private defense agencies and insurance companies selected by customers which would operate competitively in a market and fulfill the roles of courts and the police."
 right_anarchism_SOL: "Jeffersonianism"
 classical_liberalism: "Classical Liberalism"
 classical_liberalism_desc: "\n\n\n\n£GFX_Ideology_classical_liberal\n\n\n\n\n\n§YClassical Liberalism§! is a political ideology that advocates civil liberties under the rule of law with an emphasis on economic freedom. It developed in the early 19th century, building on ideas from the previous century as a response to urbanization and the Industrial Revolution. Classical Libertarians closely follow Adam Smith, and the beliefs of utlitarianism, natural law, social contract and natural rights."
 civic_nationalism: "National Liberalism"
 civic_nationalism_desc: "\n\n\n\n£GFX_Ideology_civic_nationalism\n\n\n\n\n\n§YNational-Liberalism§!  is a variant of liberalism combining liberal policies with civic nationalism, cultural heritage, and a commitment to the nation-state. It seeks to reconcile individual freedoms with a shared national identity, advocating for limited government intervention in the economy and instead supporting the free market. While they do support social progressivism, it is almost entirely within the cultural framework of a nation and vehemently opposes changes that reject traditionalism. National Liberalism is also fueled by patriotism and strong cultural connections, though this varies by country. Above all, they support order and national security, in some instances doing whatever they can to ensure said order is maintained..."
 trumpism_market: "Trumpism"
 trumpism_market_desc: "\n\n\n\n£GFX_ideology_trumpism_market_banner\n\n\n\n\n\n§YTrumpism§! is a political movement in the United States that encompasses the political ideologies associated with Donald Trump and his supporters. It includes right-wing populism, right-wing anti globalism, national conservatism, and neo-nationalism, and is characterized by strong illiberal beliefs.\n\nThroughout his leadership Trump emphasized reliance on deregulations, cutting federal overreach, and business-oriented policies. He took control of the movement and weeded out disloyal individuals from its ranks. The libertarians have become the core of the movement, always putting the interests of American enterprise first.\nThe ideologeme has been solidified. His acolytes will now follow them to the latter."
 putinism_liberal: "Liberal Putinism"
 putinism_liberal_desc: "\n\n\n\n£GFX_Ideology_liberal_putinism_banner\n\n\n\n\n\n§YLiberal Putinism§! is an ideology that is a culmination of Vladimir Putin and Boris Yeltsin ideals. An apolitical democracy, heavily technocratic and state capitalist with an emphasis on free market.\n\nThe state fights for the safety of Russia, using any methods necessary. Russian Nazis mysteriously disappearing without trace, opposition leaders jailed, both anti-immigration and pro-muslim protests being put down - the state seeks to keep a tight balance in the nation. While this causes a lot hate for the state since noone feels like the government "defends" them, it also makes the people apathetic towards politics and ultimately prevents large scale ideological clashes. This, however, does not mean the people hate the nation. Civil society, traditional values, national unity are all nurtured by the state. The idea of "The Russian World" and a Multi-Polar order are one of the main driving forces of the system itself.\n\nEven if Vladimir Vladimirovich gone, his ideals will live on. However, his system will be improved upon to create a perfect Russia, unchanging and truly united."
 
 #Conservative Democrat
 conservative: "Conservative"
 conservative_noun: "Conservative"
 conservative_desc: "Conservative Democracy"
 conservative_drift: "Drift towards Conservatism"
 conservative_color: "§3"
 conservative_color_name: "§3$conservative$§!"

 #Conservative Sub Ideologies
 right_centrist: "Right-Centrism"
 right_centrist_desc: "\n\n\n\n£GFX_Ideology_Right_Centrism\n\n\n\n\n\n§YRight-Centrism§!, often referred to as the Centre-right, is a syncretic mix of right-wing ideologies holding moderate positions, described as being close to the \"center\", with Right-Centrism aiming to unite them under a single organization or agenda. Policies include economic moderation, with proponents advocating for a mixed-market economy that values free-market principles with a degree of government intervention to address economic issues. Right centrists are usually socially conservative, though are willing to compromise on social issues. Despite valuing personal liberty, they are often willing to allow restrictions in the name of national security or stability, with the core tenet of Right-Centrism being pragmatism."
 right_populism: "Right-Wing Populism"
 right_populism_desc: "\n\n\n\n£GFX_Ideology_right_populist\n\n\n\n\n\n§YRight-wing Populism§! is an ideology combining populist rhetoric with right-wing ideas. Right-wing Populist rhetoric traditionally espouses anti-elitist, anti-establishment, nationalist and nativist sentiments. Right-wing Populists traditionally blame immigration, globalism, and liberal values for societal decline, and in turn offer policies of tigheter immigration control, high tarrifs and a return to traditional values as a remedy. Right-wing Populists are traditionally extremely nationalistic in nature, and argue for economic protectionism."
 neoconservative: "Neoconservatism"
 neoconservative_desc: "\n\n\n\n£GFX_Ideology_neo_conservative\n\n\n\n\n\n§YNeoconservatism§! is a political movement born in the United States during the 1960s among liberal hawks who became disenchanted with the increasingly pacifist foreign policy of the Democratic Party and with the growing New Left and counterculture of the 1960s. Many also began to question their liberal beliefs regarding domestic policies, such as the welfare state. Neoconservatives typically advocate the promotion of democracy and interventionism in international affairs, including peace through strength, and are known for their disdain towards communism and political radicalism."
 christian_conservatism: "Christian Conservativism"
 christian_conservatism_desc: "\n\n\n\n£GFX_Ideology_Christian_Conservatism\n\n\n\n\n\n§YChristian Conservativism§! is a Christian political movement seeking to influence politics and public policy with their interpretation of the teachings of Christianity. The Christian right is notable for advancing socially conservative positions on issues including support for school prayer, intelligent design, temperance , Christian nationalism and Sunday Sabbatarianism. Meanwhile, they are traditionally opposed to ideas such as sex education, abortion, embryonic stem cell research, euthanasia, contraception, homosexuality and pornography."
 mormon_conservatism: "Mormon Conservatism"
 constitutionalist: "Constitutionalism"
 constitutionalist_desc: "\n\n\n\n£GFX_Ideology_constitutionalism\n\n\n\n\n\n§YConstitutionalism§! is an ideology that proposes that the foundation of the country is not negotiable. Proponents despise social and economic change that takes away from the picture the country was founded on. Some call them stagnant, but under them, businesses know where their place is and what their rights are, making the economy trust the government."
 classical_conservatism: "Classical Conservatism"
 classical_conservatism_desc: "\n\n\n\n£GFX_ideology_classical_conservatismsub\n\n\n\n\n\n§YClassical Conservativism§!, or Traditional Conservatism, is a political and social philosophy that emphasizes the importance of transcendent moral principles manifested through certain natural laws to which society should adhere prudently. Traditionalist conservatism is based on Aristotle's and Edmund Burke's political views. Traditionalists value social ties and the preservation of ancestral institutions above what they see as excessive individualism."
 islamic_democrat: "Islamic Democracy"
 islamic_democrat_desc: "\n\n\n\n£GFX_ideology_islamic_democracy\n\n\n\n\n\n§YIslamic Democracy§!, also known as Islamic Liberalism, is the halfway point between secularism and Sharia Democracy, attempting to merge the ideas of the Quran with Western liberal ideas, such as democracy, human rights, pluralism, and the rule of law, though proponents believe Islam should still play a strong role in state affairs."
 sovereign_democracy: "Sovereign Democracy"
 sovereign_democracy_desc: "\n\n\n\n£GFX_Ideology_sovdem\n\n\n\n\n\n§YSovereign Democracy§! is a niche political ideology which goal is to create a "perfect" democracy that ignores western democratic party bickering. Parties not only have similar views, but also cooperate and work for the betterment of the state as a whole. The civilian society serves as a check on the parties, using their influence to oust corrupt and unpatriotic officials for example. \nThe Right party advocates for a more open market, albeit under a nationalized sector of key industries. It is catered to a more nationalistic crowd without any racial supremacy."
 sovereign_democracy_patrushev: "Populist Conservatism"
 sovereign_democracy_patrushev_desc: "\n\n\n\n£GFX_Ideology_sovdem\n\n\n\n\n\n§YSovereign Democracy§! is a niche political ideology which goal is to create a "perfect" democracy that ignores western democratic party bickering. Parties not only have similar views, but also cooperate and work for the betterment of the state as a whole. The civilian society serves as a check on the parties, using their influence to oust corrupt and unpatriotic officials for example. \nThe Right party advocates for a more open market, albeit under a nationalized sector of key industries. It is catered to a more nationalistic crowd without any racial supremacy.\n\nPatrushev combines populist slogans and actions with conservative principles to secure his administration, while also monitoring the opposition's views, sometimes taking them and presenting them as United Russia's own."
 sovereign_democracy_sobyanin: "Progressive Conservatism"
 sovereign_democracy_sobyanin_desc: "\n\n\n\n£GFX_Ideology_sovdem\n\n\n\n\n\n§YSovereign Democracy§! is a niche political ideology which goal is to create a "perfect" democracy that ignores western democratic party bickering. Parties not only have similar views, but also cooperate and work for the betterment of the state as a whole. The civilian society serves as a check on the parties, using their influence to oust corrupt and unpatriotic officials for example. \nThe Right party advocates for a more open market, albeit under a nationalized sector of key industries. It is catered to a more nationalistic crowd without any racial supremacy.\n\nSobyanin wants to spread the freedom and progress he helped bring to Moscow to other cities in Russia. He's also trying to make up with some socially progressive groups and opposition in Russia."
 sovereign_democracy_mishustin: "Technocratic Conservatism"
 sovereign_democracy_mishustin_desc: "\n\n\n\n£GFX_Ideology_sovdem\n\n\n\n\n\n§YSovereign Democracy§! is a niche political ideology which goal is to create a "perfect" democracy that ignores western democratic party bickering. Parties not only have similar views, but also cooperate and work for the betterment of the state as a whole. The civilian society serves as a check on the parties, using their influence to oust corrupt and unpatriotic officials for example. \nThe Right party advocates for a more open market, albeit under a nationalized sector of key industries. It is catered to a more nationalistic crowd without any racial supremacy.\n\nMishustin focuses on creating a well-controlled and productive government that citizens don't have to worry about, while also keeping democracy at a level where people don't feel alienated from the state."
 sovereign_democracy_belousov: "Paternalistic Conservatism"
 sovereign_democracy_belousov_desc: "\n\n\n\n£GFX_Ideology_sovdem\n\n\n\n\n\n§YSovereign Democracy§! is a niche political ideology which goal is to create a "perfect" democracy that ignores western democratic party bickering. Parties not only have similar views, but also cooperate and work for the betterment of the state as a whole. The civilian society serves as a check on the parties, using their influence to oust corrupt and unpatriotic officials for example. \nThe Right party advocates for a more open market, albeit under a nationalized sector of key industries. It is catered to a more nationalistic crowd without any racial supremacy.\n\nBelousov wants to create a strong, united democracy where people are cared for and opposition is engaged in moderate debate. However, he may not always hear their voices, for the sake of ensuring stability and order."
 putinism_conservative: "Bleeding Heart Putinism"
 putinism_conservative_desc: "\n\n\n\n£GFX_Ideology_conservative_putinism_banner\n\n\n\n\n\n§YBleeding Heart Putinism§! is a more flexible approach than the system Dmitry Medvedev established. This initiative aims to ease discontent with the strict policies of the pre-war and wartime eras. Although it's not a full democracy, it encourages debate within the All-Russian People's Front. This fosters a variety of solutions and greater transparency from the government and political elite. Additionally, it seeks to enhance public healthcare, as Vorontsova herself desires.\nThey aim is to create an illusion of limited freedom, addressing public disenchantment with Kremlin rule and censorship. Maria Vorontsova, Vladimir Putin's daughter, serves as the public face of these reforms. While she engages with the public, the Kremlin and its administration handle matters behind the scenes."
 russian_patriotic_populism: "Democratic Populism"
 russian_patriotic_populism_desc: "\n\n\n\n£GFX_Ideology_patriotic_democracy_banner\n\n\n\n\n\n§YDemocratic Populism§! is among newest ideological terms cultivated under Navalny's 'Patriotic Democracy'. "Patriotic" in its name stands for government's position to protect Russian statehood and unique identity, as well as to ensure that patriotism is combined with democratic institutions.\n\nPopulistic variant consists of right-wing rhetoric and formation of a wide parliamentary coalition in which the ruling party takes charge, through backroom deals and adopted policies. Having more relaxed media and state laws, it still rallies on the executive body to deal with any harmful subversion against its rule. While ideal economic system for populists would be responsible market capitalism, they may have to make amends with members of the coalition, including passing social policies and extended welfare to keep balances that were constructed to safeguard Patriotic Democracy.\n\nJust like other possible variants, it often places Russian nationality as state-forming, and tries to reduce minorities' participation in state affairs, claiming that 'backwards thinking non-core people may try to subdue democratic processes of the country, and destroy our democracy'."
 generic_patriotic_populism: "Democratic Populism"
 generic_patriotic_populism_desc: "\n\n\n\n£GFX_Ideology_patriotic_democracy_banner_generic\n\n\n\n\n\n§YDemocratic Populism§! is among newest ideological terms cultivated under Navalny's 'Patriotic Democracy'. "Patriotic" in its name stands for government's position to protect Russian statehood and unique identity, as well as to ensure that patriotism is combined with democratic institutions.\n\nPopulistic variant, after the revolution in Belarus, went beyond the Russian political field, mainly gaining popularity among liberal and conservative Euro-sceptics who prioritise the fight against corruption, bureaucracy and external exploitation. As in Russia, their ideas are based on right-wing rhetoric and the formation of a wide parliamentary coalition in which the ruling party takes charge, through backroom deals and adobted policies. Having more relaxed media and state laws, it still rallies on the executive body to deal with any harmful subversion against its rule. While the ideal economic system for populists would be responsible market capitalism, they may have to make amends with members of the coalition, including passing social policies and extended welfare to keep balances that were constructed to safeguard Patriotic Democracy."
 belarus_patriotic_populism: "Democratic Populism"
 belarus_patriotic_populism_desc: "\n\n\n\n£GFX_Ideology_patriotic_democracy_blr_banner\n\n\n\n\n\n§YDemocratic Populism§! is among newest ideological terms cultivated under Navalny's 'Patriotic Democracy'. "Patriotic" in its name stands for government's position to protect Russian statehood and unique identity, as well as to ensure that patriotism is combined with democratic institutions.\n\nPopulistic variant, after the revolution in Belarus, went beyond the Russian political field, mainly gaining popularity among liberal and conservative Euro-sceptics who prioritise the fight against corruption, bureaucracy and external exploitation. As in Russia, their ideas are based on right-wing rhetoric and the formation of a wide parliamentary coalition in which the ruling party takes charge, through backroom deals and adobted policies. Having more relaxed media and state laws, it still rallies on the executive body to deal with any harmful subversion against its rule. While the ideal economic system for populists would be responsible market capitalism, they may have to make amends with members of the coalition, including passing social policies and extended welfare to keep balances that were constructed to safeguard Patriotic Democracy."
 france_patriotic_populism_desc: "\n\n\n\n£GFX_Ideology_patriotic_democracy_fra_banner\n\n\n\n\n\n§YDemocratic Populism§! is among newest ideological terms cultivated under Navalny's 'Patriotic Democracy'. "Patriotic" in its name stands for government's position to protect Russian statehood and unique identity, as well as to ensure that patriotism is combined with democratic institutions.\n\nPopulistic variant, after the revolution in Belarus, went beyond the Russian political field, mainly gaining popularity among liberal and conservative Euro-sceptics who prioritise the fight against corruption, bureaucracy and external exploitation. As in Russia, their ideas are based on right-wing rhetoric and the formation of a wide parliamentary coalition in which the ruling party takes charge, through backroom deals and adobted policies. Having more relaxed media and state laws, it still rallies on the executive body to deal with any harmful subversion against its rule. While the ideal economic system for populists would be responsible market capitalism, they may have to make amends with members of the coalition, including passing social policies and extended welfare to keep balances that were constructed to safeguard Patriotic Democracy."
 transnistria_patriotic_populism_desc: "\n\n\n\n£GFX_Ideology_patriotic_democracy_tra_banner\n\n\n\n\n\n§YDemocratic Populism§! is among newest ideological terms cultivated under Navalny's 'Patriotic Democracy'. "Patriotic" in its name stands for government's position to protect Russian statehood and unique identity, as well as to ensure that patriotism is combined with democratic institutions.\n\nPopulistic variant, after the revolution in Belarus, went beyond the Russian political field, mainly gaining popularity among liberal and conservative Euro-sceptics who prioritise the fight against corruption, bureaucracy and external exploitation. As in Russia, their ideas are based on right-wing rhetoric and the formation of a wide parliamentary coalition in which the ruling party takes charge, through backroom deals and adobted policies. Having more relaxed media and state laws, it still rallies on the executive body to deal with any harmful subversion against its rule. While the ideal economic system for populists would be responsible market capitalism, they may have to make amends with members of the coalition, including passing social policies and extended welfare to keep balances that were constructed to safeguard Patriotic Democracy."
 conservative_socialism: "Conservative Socialism"
 conservative_socialism_desc: "\n\n\n\n£GFX_Ideology_Conservative_Socialism\n\n\n\n\n\nConservative Socialism, Bourgeois Socialism, or Paternalistic Conservatism, refers to an ideology that combines elements of Socialism with right-wing conservative values. Conservative Socialists support conservative values such as traditional family structures, religious beliefs, and national identity, as well as policies that promote social cohesion, cultural preservation, and moral values, often opposing social changes associated with liberalism or progressivism. While Conservative Socialists support government intervention in economic affairs, they are more prone to accepting market mechanisms and private enterprise to a greater extent such as in China and the Soviet Union."
 supervised_democracy: "Transitional Democracy"
 supervised_democracy_desc: "\n\n\n\n£GFX_ideology_transitional_democracy\n\n\n\n\n\n§YTransitional Democracy§!, otherwise called ''Democratization,'' is the period in which an authoritarian government transitions into a stable, democratic one, usually by the use of force, to safeguard it from internal or external threats. During this transitional period, significant political, social, and institutional changes go underway to achieve democratic principles, including free and fair elections, free speech, the protection of human rights, and the rule of law. As a consequence, transitional regimes experience significant civil unrest, though said unrest is not present in every case. Common examples of transitional democracies include Poland, Hungary, the Czech Republic, Spain, and Portugal, making this form of government the most common since the end of the Cold War. To what extent this occurs can be affected by various factors, and there are many examples of democratization failing because of them, such as in Myanmar. The military also plays a role in several instances of transitional democracy, with apoliticism allowing it to carry out its duties efficiently."
 trumpism_conservative: "Trumpism"
 trumpism_conservative_desc: "\n\n\n\n£GFX_ideology_trumpism_conservative_banner\n\n\n\n\n\n§YTrumpism§! is a political movement in the United States that encompasses the political ideologies associated with Donald Trump and his supporters. It includes right-wing populism, right-wing anti globalism, national conservatism, and neo-nationalism, and is characterized by strong illiberal beliefs.\n\nThroughout his leadership Trump emphasized reliance on strong national values, natalism, and America First policies. He took control of the movement and weeded out disloyal individuals from its ranks. The populists have become the core of the movement, always putting the interests of American citizens first.\nThe ideologeme has been solidified. His acolytes will now follow them to the latter."
 fehlinger_doctrine: "Fehlinger Doctrine"
 fehlinger_doctrine_desc: "\n\n\n\n£GFX_GER_fehlinger_doctrine_ideology\n\n\n\n\n\nMeet the §2#FehlingerDoctrine§!\npunish §2#HostileStates§! by supporting dismantling them along existing internal administration lines into new better free states as market democracies, fully integrated in free world! £GFX_GER_dont_at_me_blue_ti §2UN§! £GFX_GER_dont_at_me_blue_ti §2OECD§! £GFX_GER_dont_at_me_blue_ti §2OSCE§! £GFX_GER_dont_at_me_blue_ti §2wto§! based on §2#ExYugoslavia§! success model"
 #Authdem
 authoritarian_democrat: "Authoritarian Democratic"
 authoritarian_democrat_noun: "Authoritarian Democracy"
 authoritarian_democrat_desc: "Authoritarian Democracy"
 authoritarian_democrat_drift: "Drift towards Authoritarian Democracy"
 authoritarian_democrat_color: "§g"
 authoritarian_democrat_color_name: "§g$authoritarian_democrat$§!"
 
 #Authoritarian Democratic Sub Ideologies
 ultra_conservatism: "Ultraconservatism"
 ultra_conservatism_desc: "\n\n\n\n£GFX_Ideology_ultra_conservatism\n\n\n\n\n\n§YUltraconservatism§!, also known as Extreme Conservatism, represents a more rigid and uncompromising form of conservatism. Ultraconservatives tend to resist or reject social change and reform, and often seek to return to what they perceive as a purer or idealized past. They are often extremely critical of modernization, progressive social movements, and changes in traditional social norms. Ultraconservatives often advocate strict interpretation and application of religious, cultural, or moral values. They may oppose government intervention in social and economic affairs and advocate for the minimization of government involvement. Ultraconservatives may also oppose international cooperation and deals, prioritizing national sovereignty instead."
 mormon_ultra_conservatism: "Mormon Ultraconservatism"
 oligarchist: "Oligarchy"
 oligarchist_desc: "\n\n\n\n£GFX_Ideology_oligarchy\n\n\n\n\n\n§YOligarchy§! is a form of power structure in which the state system is intertwined with networks of influence of certain noble and wealthy corporations, more commonly known as "Oligarchs". These people, although not directly in charge of the country, have various leverage and economic connections that allow them to pursue policies favorable to them in government offices. Oligarchs, although usually extremely corrupt and difficult to tame, can be put to the benefit of the state if it balances oligarchic influence and national interests in a favorable way. Their connections, not only internally but also externally, can help solve geopolitical problems, and their capital and managerial skills can help develop the national economy and trade."
 islamic_authoritarian: "Sharia Democracy"
 islamic_authoritarian_desc: "\n\n\n\n£GFX_ideology_sharia_democracy\n\n\n\n\n\n§YSharia Democracy§!, often associated with Khomeinism, is a political ideology rooted in the principles of Islamic Sharia Law, particularly as interpreted by Ayatollah Ruhollah Khomeini. It combines elements of Islamic governance with a form of participatory democracy, seeking to establish a political system guided by Islamic law. The implementation of said law is central to the ideology, with it being the basis of legislation and governance. It involves interpreting and applying Islamic text to legal and social matters, naturally giving Islamic clergy a large amount of power in the state of affairs. Velayat-e Faqih, Guardianship of the Jurist, is one of the most central ideas of Sharia Democracy, giving full authority to the Supreme Leader elected by Islamic clergy. The president, however, is elected through popular participation. It also emphasizes anti-imperialism, a welfare state, and supposed anti-corruption"
 confucian_hyperconservativism: "Confucian Hyperconservatism"
 confucian_hyperconservativism_desc: "\n\n\n\n£GFX_Ideology_Confucian_Hyperconservatism\n\n\n\n\n\n§YConfucian Hyperconservatism§! also known as the Self-Revival Movement, refers to an extreme form of political and social conservatism originating from Confucian philosophy, particularly traditional values and social hierarchies common in China. Despite being mostly destroyed and phased out of popularity under Mao, this subset of Confucianism has been rapidly regaining attention inside and outside of China, with organizations such as the Falun Gong attributing to its growth. Espousing opposition to modernization, which it perceives as antithetical to Chinese culture and Confucian tradition, it supports authoritarian governance and paternalism; positing that a strong, centralized bureaucracy as well as a wise and virtuous ruler is essential for social harmony. It is fervently anti-communist and anti-liberal, rejecting forms of progressive morality and espousing a philosophy of ''self-strengthening'', tying into Confucian moralism. Certain proponents of this strain of Confucianism also support Han exceptionalism, though it is not inherent to the ideology."
 corporatocracy: "Corporatocracy"
 corporatocracy_desc: "\n\n\n\n£GFX_Ideology_corp\n\n\n\n\n\n§YCorporatocracy§! is a term used to refer to an economic, political and judicial system controlled by corporations or corporate interests in which Business Corporations have a significant control over government if not total control."
 military_democracy: "Military Democracy"
 military_democracy_desc: "\n\n\n\n£GFX_ideology_military_democracysub\n\n\n\n\n\n§YMilitary Democracy§! is essentially a military junta with an elective system of governance The society under such ideology is very militaristic, with military service regarded as a sign of social status. Usually such societies form during wars and later transition to either democratic or authoritarian systems."
 hybrid_regime: "Anocracy"
 hybrid_regime_desc: "\n\n\n\n£GFX_ideology_ideology_anocracy_banner\n\n\n\n\n\nAn §YAnocracy§!, often known as a Hybrid Regime, is loosely defined as a form of government that mixes democratic and autocratic elements in the ways of governing a nation. While anocracies tend to allow some form of (albeit semi) democratic processes like elections, they tend to hold some laws that are deemed to be undemocratic, if not autocratic. While not necessarily corrupt and oppressive as their pure autocratic counterparts, they are still prone to commiting the same drastic actions as autocracies do."
 assadist_baathism: "Assadist Ba'athism"
 assadist_baathism_desc: "\n\n\n\n£GFX_ideology_assadist_baathism_banner\n\n\n\n\n\n§YAssadist Ba'athism§! or the Corrective Movement, is a term used to describe the policies of Hafez al-Assad and his successor, Bashar al-Assad. Rooted in Ba'athism, a pan-Arab socialist ideology, Assadism has evolved into a separate form, shaped by the policies of the Assad dynasty. Elements of Assadism include secularism, Arab nationalism, and socialism, which is fundamental to Ba'athism, though its practical implementation has often involved economic pragmatism and shifts in said policies. The ideology prioritizes the maintenance of a strong, centralized bureaucratic state utilizing Popular Fronts to solidify control around a single party, the Ba'ath Party, with an emphasis on political stability and the suppression of dissent. This has drawn criticism from both in and outside of Syria, with the autocratic rule of Bashar al-Assad leading to an attempted revolution and Civil War in the 2010s. While they have the same roots as the Iraqi Ba'ath, they have various differences, with Hafez's liberalization and privatization efforts of the 2000s contrasting Saddam's economy."
 putinism: "Putinism"
 putinism_desc: "\n\n\n\n£GFX_Ideology_putinism_banner\n\n\n\n\n\n§YPutinism§! is an ideology that is a culmination of Vladimir Putin's ideals. An apolitical authoritarian democracy,  heavily technocratic and state capitalist with an emphasis on free market.\n\nThe state fights for the safety of Russia, using any methods necessary. Russian Nazis mysteriously disappearing without trace, opposition leaders jailed, both anti-immigration and pro-muslim protests being put down - the state seeks to keep a tight balance in the nation. While this causes a lot hate for the state since noone feels like the government "defends" them, it also makes the people apathetic towards politics and ultimately prevents large scale ideological clashes. This, however, does not mean the people hate the nation. Patriotism, traditional values, national unity are all nurtured by the state. The idea of "The Russian World" and a Multi-Polar order are one of the main driving forces of the system itself.\n\nEven if Vladimir Vladimirovich gone, his ideals will live on. However, his system will be improved upon to create a perfect Russia, unchanging and truly united."
 sovereign_democracy_auth_dem: "Sovereign Democracy"
 sovereign_democracy_auth_dem_desc: "\n\n\n\n£GFX_Ideology_sovdem\n\n\n\n\n\n§YSovereign Democracy§! is a niche political ideology which goal is to create a "perfect" democracy that ignores western democratic party bickering. Parties not only have similar views, but also cooperate and work for the betterment of the state as a whole. The civilian society serves as a check on the parties, using their influence to oust corrupt and unpatriotic officials for example.\nThe Right party advocates for a more open market, albeit under a nationalized sector of key industries. It is catered to a more nationalistic crowd without any racial supremacy."
 sovereign_democracy_volodin: "Idiosyncratic Putinism"
 sovereign_democracy_volodin_desc: "\n\n\n\n£GFX_Ideology_sovdem\n\n\n\n\n\n§YSovereign Democracy§! is a niche political ideology which goal is to create a "perfect" democracy that ignores western democratic party bickering. Parties not only have similar views, but also cooperate and work for the betterment of the state as a whole. The civilian society serves as a check on the parties, using their influence to oust corrupt and unpatriotic officials for example.\nThe Right party advocates for a more open market, albeit under a nationalized sector of key industries. It is catered to a more nationalistic crowd without any racial supremacy.\n\nVolodin seeks to end the harmful democratic experiment and bring order through a one-party dominant system, like in the good old days. He uses patriotic imagery and siloviki mechanisms to secure his control."
 sovereign_democracy_naryshkin: "National-Conservatism"
 sovereign_democracy_naryshkin_desc: "\n\n\n\n£GFX_Ideology_sovdem\n\n\n\n\n\n§YSovereign Democracy§! is a niche political ideology which goal is to create a "perfect" democracy that ignores western democratic party bickering. Parties not only have similar views, but also cooperate and work for the betterment of the state as a whole. The civilian society serves as a check on the parties, using their influence to oust corrupt and unpatriotic officials for example.\nThe Right party advocates for a more open market, albeit under a nationalized sector of key industries. It is catered to a more nationalistic crowd without any racial supremacy.\n\nNaryshkin's connections to the internal security apparatus help him to maintain order, he uses traditional values and anti-globalist talking points to re-establish Russia under one-party rule."
 sovereign_democracy_shoygu: "Militaristic Patriotism"
 sovereign_democracy_shoygu_desc: "\n\n\n\n£GFX_Ideology_sovdem\n\n\n\n\n\n§YSovereign Democracy§! is a niche political ideology which goal is to create a "perfect" democracy that ignores western democratic party bickering. Parties not only have similar views, but also cooperate and work for the betterment of the state as a whole. The civilian society serves as a check on the parties, using their influence to oust corrupt and unpatriotic officials for example.\nThe Right party advocates for a more open market, albeit under a nationalized sector of key industries. It is catered to a more nationalistic crowd without any racial supremacy.\n\nShoygu's secret deals with the general staff and the military establishment help him wrest their influence to bring military fervor to Russia, using loyal veterans and hardliners to secure the United Russia and restore its dominant position."
 patriotic_socialism: "Patriotic Socialism"
 patriotic_socialism_desc: "\n\n\n\n£GFX_Ideology_patriotic_socialism_banner\n\n\n\n\n\n§YPatriotic Socialism§! is a rapidly evolving political ideology that combines elements of socialism and patriotism.\nPatriotic Socialism emphasizes the importance of national pride and a sense of belonging to one's country, and rejects the overly radical practices of communists both at home and abroad. While generally remaining true to the goals of achieving a fair social welfare, they allow for some private ownership and can either nationalize or privatize with the aim of pragmatic politics and the health of the economy."
 russian_patriotic_meritocracy: "Navalnyist Populism"
 russian_patriotic_meritocracy_desc: "\n\n\n\n£GFX_Ideology_patriotic_democracy_banner\n\n\n\n\n\n§YNavalnyist Populism§! is a among newest ideological terms cultivated under Navalny's 'Patriotic Democracy'. "Patriotic" in its name stands for government's position to protect Russian statehood and unique identity, as well as to ensure that patriotism is combined with democratic institutions.\n\nMeritocratic strain differs by being the most anocratic, constructing dominant-party system, and having extensive managerial caste to take care of bureaucratic needs, while 'the managers' themselves are constantly interchanged and recruited from worthy ranks of the party or lower state appartus. Often pivots to conservatism, it, however, may enact social welfare policies, and progressive laws to keep balances that were constructed to safeguard Patriotic Democracy.\n\nJust like other possible variants, it often places Russian nationality as state-forming, and tries to reduce minorities' praticipation in state affairs, claiming that 'backwards thinking non-core people may try to subdue democratic processes of the country, and destroy our democracy'."
 novocommunism: "Novocommunism" #Novo??? Hello???
 novocommunism_desc: "\n\n\n\n£GFX_Ideology_patriotic_socialism_banner\n\n\n\n\n\n§YNovocommunism§! is a rapidly evolving political ideology that combines elements of socialism and patriotism.\nNovocommunism emphasizes the importance of national pride and a sense of belonging to one's country, and rejects the overly radical practices of communists both at home and abroad. While generally remaining true to the goals of achieving a fair social welfare, they allow for some private ownership and can either nationalize or privatize with the aim of pragmatic politics and the health of the economy."
 russian_monarchist_conservative: "Tsarist Conservatism"
 russian_monarchist_conservative_desc: "\n\n\n\n£GFX_Ideology_ultra_conservatism\n\n\n\n\n\nIn the ever-evolving world, where dangerous ideas of some republicans and godless Marxists are on the rise, Russian Conservative Monarchism emerges as a refreshing alternative. It combines democratic principles with religious spirituality and patriotic sentiment, and loyality to the ruler of the land.\n\nThe idea of Russian constitutional monarchy emerged from a desire to safeguard the world from the extremes of both sides."
 trumpism_authdem: "Trumpism"
 trumpism_authdem_desc: "\n\n\n\n£GFX_ideology_trumpism_authdem_banner\n\n\n\n\n\n§YTrumpism§! is a political movement in the United States that encompasses the political ideologies associated with Donald Trump and his supporters. It includes right-wing populism, right-wing anti globalism, national conservatism, and neo-nationalism, and is characterized by strong illiberal beliefs.\n\nThroughout his leadership Trump emphasized reliance on strong, but fair federal government, nationalistic fervor, and hardline America First stances. He took control of the movement and eliminated disloyal individuals from its ranks. The patriots have become the heart of the movement, always putting the interests of the American nation first.\nThe ideologeme has been solidified. His acolytes will now follow them to the latter."
 ultraglobalism: "Ultraglobalism"
 ultraglobalism_desc: "\n\n\n\n£GFX_GER_ultraglobalism_banner\n\n\n\n\n\n§YUltraglobalism§! is a set of ideas and principles established and followed by a very limited circle of the richest and most powerful individuals of the world, represented by people such as Klaus Schwab and the World Economic Forum.\n\nIn the conditions of an ever changing system of the world and the collapse of existing hegemonies, the ultraglobalist elites have come to the conclusion that this process will be fatal for their riches and power, and the only way to preserve them is to take control of the collapse itself and lead it to transform capitalism into an entirely different system.\n\nUltraglobalism strives to establish control over every aspect of human life by means of absolute digitalization and surveillance, mass integration of cybernetics, as well as constructing the total dominance of transnational corporations over the world economy.\nFor decades, such a system was thought to only exist in the minds of those that whisper conspiracies, but now the average person wakes up in a new world, forever changed.\n\n§gSouls will obey, minds will kneel and their bodies will succumb. The mask has slipped, and the world sees its true face.\n\nIf the only way for you to preserve power is to maintain a collapsing system, how much of humanity are you willing to sacrifice?§!"
 SIG_pragmatic_conservatism: "Pragmatic Conservatism"
 auth_populism: "Populism"
 auth_populism_desc: "\n\n\n\n£GFX_ideology_ideology_auth_populism_banner\n\n\n\n\n\n§YPaternalist Populism§! - This form of populism defies rigid ideological frameworks. Instead, these populists embrace a wide array of often conflicting ideals. They tend to concentrate on specific issues that deeply resonate with the nation's people. Economic policies can swing from left to right, depending on the prevailing mood of the populace. However, cultural and social stances typically adhere to conservative viewpoints.\n\nPopulists often champion anti-elitism and an anti-corruption stance. But, what sets authoritarian populists apart is their ambition to maintain power indefinitely. They may employ undemocratic tactics to silence political opponents and rally their loyal followers as a bulwark against what they perceive as corrupt bureaucrats and politicians serving the elite."
 pragmatic_socialism: "Pragmatic Socialism"
 pragmatic_socialism_desc: "\n\n\n\n£GFX_ideology_ideology_pragmatic_socialism_banner\n\n\n\n\n\n§YPragmatic Socialism§! is a governance philosophy that blends socialist principles with contemporary, non-Marxist strategies. It calls on non-ideological experts and reformers to guide public affairs, moving away from strict adherence to socialist doctrine. Rather than pursuing extreme ideological goals, pragmatic socialists often strive for practical compromises with capitalist interests and non-socialist groups.\n\nIn today's socialist landscape, a market economy is not uncommon. Pragmatic socialists go further by either abandoning economic socialism entirely or retaining only its core elements. Some regimes may keep it as a tool for political populism, appealing to the people's needs."
 leonid_slutsky_thought: "Leonid Slutsky Thought"
 leonid_slutsky_thought_desc: "\n\n\n\n£GFX_ideology_leonid_slutsky_thought_banner\n\n\n\n\n\n§YLeonid Slutsky’s Thought§! offers a distinct take on Vladimir Zhirinovsky’s philosophy. As the leader of the more moderate and democratic wing within the LDPR, Slutsky champions a unique form of nationalist democracy aimed at enhancing Russian citizens' freedom and security.\nHe believes in a pragmatic approach, recognizing the need for certain liberties and civic reforms to prevent any potential overthrow of the LDPR government.\nIn both foreign and domestic affairs, the Slutskyists remain hawkish and protectionist, using nationalistic slogans to maintain loyalty and control among the population."
 kadyrovite_tendency: "Kadyrovite Tendency"
 kadyrovite_tendency_desc: "\n\n\n\n£GFX_ideology_kadyrovite_tendency_banner\n\n\n\n\n\n§YThe Kadyrovites§!, or §YAkhmat-Putinists§!, are an offshoot of Putinism, particularly influenced by Chechen viceroys and the Kadyrov family. They retain much of the core policies of their parent ideology but infuse them with national specifics and a personalistic touch. Relying heavily on traditional values and religion. The Kadyrovites strongly oppose dissent and any form of disloyalty toward their leader or their ruling elite.\n\nObedience and loyalty are fundamental to Kadyrovites' vision of a harmonious society. In their ideal state, power is concentrated in the hands of a strong leader, who is always right, even when he isn't.\n\nKadyrovites, not being ethnic Russians, emphasize the civic aspects of belonging to a vast country rich in traditions and diverse cultures. This might provoke the ire of a more nationalistic faction within the Putinist movement."
 populist_putinism: "Populist Putinism"
 populist_putinism_desc: "\n\n\n\n£GFX_Ideology_populist_putinism_banner\n\n\n\n\n\n§YPopulist Putinism§! combines the tenets of Putinism with a special emphasis on the people and their trust in the system. Although they share some ideals with their parent ideology, these populists present themselves as the ultimate defenders of Russia.\nPolitically, they navigate between modest liberal reforms and tightened control. Advocating for a government that prioritizes the nation's well-being, they use criticisms of existing bureaucrats to bolster their own image. They firmly uphold traditional values and the patriotism of Putin’s era, aiming to make the president appear as the ultimate protector who always places the people's well-being first.\nEconomically, their stance mirrors the mainstream approach, with notable exceptions in increased support of the social state and other prosperity programs."
 democratic_derzhavism: "Democratic Derzhavism"
 democratic_derzhavism_desc: "\n\n\n\n£GFX_ideology_derzhavism_banner\n\n\n\n\n\n"Democracy without nationalism is savagery. Nationalism without democracy is slavery."\n-Preface From the Book "National Democracy and Derzhavism"\n\n§YDemocratic Derzhavists§! primarily believe in the creation of a national democracy, where equal opportunities are given to national forces in Russia to compete with each other in debates and competitions in parliament or senate. Even though Derhavism can rarely be considered democratic, moderates still believe that the current state is a stepping stone towards eventual thawing of the system once all anti-national opposition has been dealt with. Their pipe dream is somewhat reinforced by Alikhanov's continued sympathies for Russian national democrats from the past. Their compromise with more radical factions extends as far as making Alikhanov the eternal president, while allowing only open elections for chancellor or prime minister, with a limited restoration of the Duma in the form of a National Senate."
 
