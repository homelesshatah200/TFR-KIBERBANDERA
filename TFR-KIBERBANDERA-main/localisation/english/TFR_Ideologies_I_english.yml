 #nazism subideologies
 accelerationist: "Accelerationism"
 accelerationist_desc: "\n\n\n\n£GFX_Ideology_Accelerationist\n\n\n\n\n\n§YAccelerationism§! is the idea that capitalism, or some processes associated with it, and technological change should be "accelerated" and drastically intensified to create radical social change, or in order to bring the end of capitalism. Accelerationists support sabotage, mass killings and assassinations of high-profile targets to destabilize and destroy the current system, seen as a system upholding a Jewish and multicultural New World Order."
 babylonian_nazism: "Babylonian Nazism"
 babylonian_nazism_desc: "\n\n\n\n£GFX_Ideology_Satanic_Nazism\n\n\n\n\n\n§YBabylonian Nazism§!, also known as the Babylonian Ethos, is the stated ideology of the Order of Nine Angles and the Sinister Path. A syncretic mixture of Traditional Satanism, Left Hand Occultist practices and Esoteric National Socialism, it calls for a militaristic, Pagan social order called the ''Imperium'' to be established in order to combat the ''Magian/Nazarene World Order'' centered in the West. Comprised of global terrorist cells, they believe in the Deo Vindex, an entity that will be released through a ''nexion'' (meaning gateway) and defeat Judeo-Christianity, allowing for ''Aryan'' society to colonize the Galaxy through a period of ''cosmic evolution'' guided by sinister dialectics. Furthermore, they call for activities such as human sacrifice, mass slaughter, the construction of conservatory camps and the practitioning of Dark Magic."
 neonazism: "Neo-Nazism"
 neonazism_desc: "\n\n\n\n£GFX_Ideology_Nat_Soc\n\n\n\n\n\n§YNeo-Nazism§! is a modern-day offshoot of National Socialism. It encompasses a broad spectrum of beliefs and practices, they tend to be less formal and rougher than their predecessor. Ultimately at its core, it revolves around the ultranationalistic and racial supremacist ideas that were central to the National Socialist German Workers' Party. Advocating for the empowerment of the Aryan Man while also seeking to establish a pure state for him and those alike to reside, while looking beyond to secure the future for themselves." 
 american_neonazism: "Neo-Nazism"
 american_neonazism_desc: "\n\n\n\n£GFX_Ideology_Nat_Soc\n\n\n\n\n\n§YNeo-Nazism§! is a modern-day offshoot of National Socialism. It encompasses a broad spectrum of beliefs and practices, they tend to be less formal and rougher than their predecessor. Ultimately at its core, it revolves around the ultranationalistic and racial supremacist ideas that were central to the National Socialist German Workers' Party. Advocating for the empowerment of the Aryan Man while also seeking to establish a pure state for him and those alike to reside, while looking beyond to secure the future for themselves." 
 national_spartanism: "National Spartanism"
 national_spartanism_desc: "\n\n\n\n£GFX_ideology_national_spartanismsub\n\n\n\n\n\n§YNational Spartanism§! is an ideology that rejects the modern lifestyle, aspousing to reject modern comforts and luxury for a spiritual awakening. In an ideal neo-spartanist society a person will live a minimalistic life, working for the betterment of both himself and his nation. This society uses ancient Sparta as a basis from which to build on, using its collectivist and militaristic identity to achieve their goals." 
 death_cult: "Apocalypticism"
 death_cult_desc: "\n\n\n\n£GFX_Ideology_death_cult\n\n\n\n\n\n§YApocalypticism§! paints a vivid canvas of cosmic cataclysms and divine reckonings, a potent belief system hinged on the precipice of the world's end. It is the narrative of a climax on a cosmic scale, a closing act of human history filled with trials, tribulations, and, ultimately, salvation. This philosophy, rooted in the fertile soil of religious prophecy, sprouts from various texts, monuments and prophecies which depict a looming finale to the world as we know it. §YApocalypticism§! teems with the echoes of a cosmic dualism, dividing the universe into the forces of good and evil, locked in an inevitable, catastrophic confrontation. Standing as a powerful testament to humanity's enduring fascination with, and fear of, the end times."
 iraqi_baathism: "Iraqi Ba'athism"
 iraqi_baathism_desc: "\n\n\n\n£GFX_Ideology_iraq_baathism\n\n\n\n\n\n§YIraqi Ba'athism§! is a political ideology rooted in Arab nationalism, socialism, and secularism, with a specific focus on the principles espoused by the Arab Socialist Ba'ath Party in Iraq. Developed by figures such as Saddam Hussein, Iraqi Ba'athism seeks to unite the Arab world under a single, secular state, prioritizing Arab unity and economic equality. Founded by Fuad al-Rikabi in the 1950s, it is highly militaristic and anti-zionist, with Saddam Hussein in particular taking a stance against Israel and the regime in Iran. Since the fall of Saddamist Iraq in 2003, resistance groups such as the Army of the Men of the Naqshbandi Order, commanded by Izzat Ibrahim al-Douri, were formed to re-establish Ba'athist Iraq, with said group initially formed to protect Iraqi Naqshbandis and Sufi Muslims who were facing repression from Sunni insurgent groups, such as Al-Qaeda in Iraq, whose tactics were opposed by the group."
 falun_dafa: "Falun Dafa"
 falun_dafa_desc: "\n\n\n\n£GFX_Ideology_falun\n\n\n\n\n\nFalun Dafa is the belief system of the Falun Gong, a Chinese new religious movement. A syncretic mixture of Buddhism, Taoism, and traditional Chinese qigong practices, it promotes the ideas of spiritual morality and divine enlightenment through a set of practices and meditation. The three principles of the Falun Dafa are truthfulness, compassion, and forbearance, which are regarded as the fundamental nature of the cosmos, and are held to be the highest manifestation of the Tao. These practices are intentionally kept hidden from outsiders, with the movement promoting fervent xenophobia and the "racial purity" of the Han people. Li Hongzhi, the founder, believes that paradises are racially segregated. Li is deified in these circles, promoting Han ultranationalism and the idea of the ''Great Revival'', which opposes interracial marriages, homosexuality, hyperconservatism, and the rejection of modern medicine. "
 eurasianism: "Neo-Eurasianism"
 eurasianism_desc: "\n\n\n\n£GFX_Ideology_neo_eurasianism\n\n\n\n\n\n§YNeo-Eurasianism§! is Ideology born from post-soviet political thought, its tenets are to place themselves against the Global Eurocentric Liberalism, dubbed by them as 'Atlanticism' and its attempts to establish hegemony of rimland over heartland people. They oppose uniformization of mankind, and instead focus on cherishing and safeguarding cultural and ethnical diversity of the Continent. Staunchly anti-capitalists and pro-collectivists, Eurasianists will seek all methods possible to unify Eurasia, and protect it from Atlanticist threats."
 obliteration_of_the_self: "Obliteration Of The Self"
 obliteration_of_the_self_desc: "\n\n\n\n£GFX_Ideology_obliteration_of_self\n\n\n\n\n\n§RObliteration Of The Self§! is an ideology that centers on the complete eradication of individual identity, desires, and personal attachments. Rooted in various philosophical and spiritual traditions, such as Buddhism, Shintoism, and Eastern Mysticism, it advocates for the abandonment of ego and complete spiritual transcendence, with certain variations advocating for ''Death-Worship'', the spiritual worship of the dignity of death. This was, on a certain level, shown in Japan during the Second World War, though certain practitioners of these beliefs in the modern day take it even further, hijacking spiritual beliefs to force the individual into compliance with the state and create a hivemind centered around martyrdom to achieve ego death. Followers of these ideals seek to attain a state of enlightenment or unity with a greater cosmic reality by renouncing personal ambitions, attachments, and the illusion of separateness."
 right_wing_accelerationist: "Right-Wing Accelerationism"
 right_wing_accelerationist_desc: "\n\n\n\n£GFX_Ideology_right_wing_accelerationist\n\n\n\n\n\n§CRight-Wing Accelerationism§! is a hyper-capitalist and techno-futurist philosophy that views unfettered market expansion, automation, and decentralized systems as an unstoppable force that will dismantle obsolete political and social structures.\nIt opposes democracy as a barrier to development and supports faster economic and technological disruption, claiming that a post-human future can only arise through increased competitiveness, privatization, and technological singularity. Traditional nation-states and moral restrictions are seen as outdated, with corporate power, artificial intelligence, and cybernetic governance replacing them in creating the next stage of civilization."
 strassarite: "Strasserism"
 strassarite_desc: "\n\n\n\n£GFX_ideology_strasserism\n\n\n\n\n\n§YStrasserism§! is a rival strain of Nazism that is popular among several neo-nazi movements across the world. Seeing the capitalist society as an inherently jewish system to control the proletariat, strasserism advocates for a more worker-based approach to economics on the grounds of socialism."
 identitarianism: "Identitarianism"
 identitarianism_desc: "\n\n\n\n£GFX_Ideology_identitarianism\n\n\n\n\n\n§YIdentitarianism§! is a more euro-centric form of ethnic nationalism, born from Nouvelle Droite, created as a way to provide an alternative to traditionalist, ethnopluralist and illiberal politics in order to distance itself from fascism and nazism. Identitarians advocate an ostensibly non-hierarchical global separatism where differences between peoples are preserved and celebrated. \nEven with that, they also advocate pan-european ideals where white Europeans are more central and prioritized and are fiercely against ideas and concepts that threaten the western world. \nThey gained notoriety in 2016-2017, benefitting from the wave of anti-islamic sentiments spread across Europe, they have nested themselves across Europe in countries such as Germany, Austria and the Nordic countries, however there are also identitarians in the United States and oceania. \nTheir primary goal is to establish ethno-spheres, each dominated by ethnically related peoples. They promote the establishment of a confederation of regional identities that would eventually replace the various nation states of Europe."
 esoteric_fascism: "Esoteric Nazism"
 esoteric_fascism_desc: "\n\n\n\n£GFX_Ideology_esoteric_nazism\n\n\n\n\n\n§YEsoteric Nazism§! describes a series of interpretations of National Socialism that combines mysticism and Neo-Paganism, usually of Norse or Baltic variations, taking heavy inspiration from certain runic symbols in their iconography. Categorized as a new religious movement, its origins were in the beliefs of certain high-ranking Nazi officials, such as Heinrich Himmler, during the Second World War. Afterward, ideologues such as Savitri Devi further developed the ideology, proposing that Adolf Hitler could be "deified" after the fall of Nazi Germany. with further proponents of this line of thought including Alexey Dobrovolsky, David Wyatt, and notably Robert Charroux, who had developed the idea of an "Aryan homeland". Today, this ideology is found in certain white nationalist circles most prominently in the United States, with it taking on a large role in certain neo-pagan movements."
 national_bolshevism: "National-Bolshevism"
 national_bolshevism_desc: "\n\n\n\n£GFX_Ideology_national_bolshevism_banner\n\n\n\n\n\n§YNational-Bolshevism§! is an ideological framework that combines elements of nationalism and socialism, aiming to create a unique system that challenges the existing political order. Founded and theorized by Aleksandr Dugin and Eduard Limonov, National-Bolshevism seeks to transcend the traditional left-right divide and forge a path towards a new, alternative society.\nAt its core, National-Bolshevism rejects the liberal democratic model and seeks to establish a strong centralized state that prioritizes the interests of the nation and its people. It emphasizes the importance of national identity, cultural heritage, and sovereignty, while also advocating for social justice, economic equality, and workers' rights."
 ITA_nazi_maoism: "Nazi-Maoism"
 ITA_national_bolshevism_desc: "\n\n\n\n£GFX_Ideology_nazi_maoism_banner\n\n\n\n\n\nTo be or not to be - That is the question. \n\nAn ideology unfamiliar to many, §YNazi-Maoism§! derives its ideological foundation from both the far-right and far-left of the political spectrum. Founded by Franco Freda in the late 1960s, Nazi-Maoism sought to address a multitude of social issues while simultaneously advocating staunch nationalism and revitilization of an ethnically pure and powerful Italy. \n\nAfter the 1970s, the popularity of Nazi-Maoism began to wane, although traces of it can still be found in various far-right groups across Italy. Today, the legacy of the Piazza Fontana and Freda lingers over the nation once more. Its supporters aspire to rebuild a stronger Italy-One where the working class is freed from its shackles of the bourgoise while also reviving the Italian national spirit."
 ITA_social_fascism_desc: "\n\n\n\n£GFX_Ideology_nazi_maoism_banner\n\n\n\n\n\nTo be or not to be - That is the question. \n\nAn ideology unfamiliar to many, §YNazi-Maoism§! derives its ideological foundation from both the far-right and far-left of the political spectrum. Founded by Franco Freda in the late 1960s, Nazi-Maoism sought to address a multitude of social issues while simultaneously advocating staunch nationalism and revitilization of an ethnically pure and powerful Italy. \n\nAfter the 1970s, the popularity of Nazi-Maoism began to wane, although traces of it can still be found in various far-right groups across Italy. Today, the legacy of the Piazza Fontana and Freda lingers over the nation once more. Its supporters aspire to rebuild a stronger Italy-One where the working class is freed from its shackles of the bourgoise while also reviving the Italian national spirit."
